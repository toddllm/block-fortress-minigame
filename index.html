// ─── AUDIO ENGINE (Web Audio API) ───
const AC=new(window.AudioContext||window.webkitAudioContext)();
function resumeAudio(){if(AC.state==='suspended')AC.resume();}

function playTone(freq,dur,type='square',vol=0.08,detune=0){
  const o=AC.createOscillator(),g=AC.createGain();
  o.type=type;o.frequency.value=freq;o.detune.value=detune;
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.connect(g);g.connect(AC.destination);
  o.start();o.stop(AC.currentTime+dur);
}
function sfxShoot(){playTone(800+Math.random()*200,0.06,'square',0.04);}
function sfxHit(){playTone(300+Math.random()*100,0.1,'sawtooth',0.05);}

function sfxPowerup(){playTone(600,0.1,'sine',0.06);setTimeout(()=>playTone(800,0.1,'sine',0.06),80);setTimeout(()=>playTone(1000,0.15,'sine',0.05),160);}
function sfxBlockBreak(){playTone(200+Math.random()*100,0.08,'square',0.03);}

function sfxTeleport(){playTone(1200,0.15,'sine',0.05);setTimeout(()=>playTone(400,0.2,'sine',0.05),100);}
function sfxGlitch(){for(let i=0;i<8;i++)setTimeout(()=>playTone(100+Math.random()*2000,0.03,'square',0.03),i*20);}
function sfxPhaseChange(){for(let i=0;i<6;i++)setTimeout(()=>playTone(300+i*100,0.2,'sine',0.05),i*60);}
function sfxOrbAttack(){playTone(900,0.15,'sine',0.05);playTone(600,0.2,'triangle',0.04);}
function sfxExplosion(){playTone(60,0.8,'sawtooth',0.12);playTone(40,1.0,'sine',0.08);for(let i=0;i<4;i++)setTimeout(()=>playTone(80+Math.random()*60,0.3,'square',0.04),i*80);}
function sfxVictoryFanfare(){const notes=[523,659,784,1047];notes.forEach((n,i)=>setTimeout(()=>playTone(n,0.3,'sine',0.06),i*150));setTimeout(()=>{[1047,1175,1319,1568].forEach((n,i)=>setTimeout(()=>playTone(n,0.4,'triangle',0.05),i*120));},700);}
function sfxWaveStart(){playTone(400,0.15,'triangle',0.05);setTimeout(()=>playTone(500,0.15,'triangle',0.05),100);setTimeout(()=>playTone(600,0.2,'triangle',0.05),200);}
function sfxThunder(){playTone(30,1.2,'sawtooth',0.15);playTone(50,0.8,'square',0.1);for(let i=0;i<8;i++)setTimeout(()=>playTone(20+Math.random()*80,0.3+Math.random()*0.3,'sawtooth',0.08+Math.random()*0.05),i*50);setTimeout(()=>{playTone(25,0.6,'sawtooth',0.1);playTone(40,0.5,'square',0.06);},400);}
function sfxSimonAppear(){for(let i=0;i<5;i++)setTimeout(()=>playTone(200+i*80,0.3,'sine',0.04),i*100);setTimeout(()=>playTone(1200,0.5,'triangle',0.06),500);}

// Music engine
let musicInterval=null,musicBeat=0;
const BASS_NOTES=[65,73,82,87];
const MELODY_NOTES=[262,294,330,349,392,440];
function startMusic(){
  stopMusic();
  musicBeat=0;
  musicInterval=setInterval(()=>{
    if(state!=='playing')return;
    const bass=BASS_NOTES[musicBeat%BASS_NOTES.length];
    playTone(bass,0.15,'triangle',0.025);
    if(musicBeat%2===0){
      const mel=MELODY_NOTES[Math.floor(Math.random()*MELODY_NOTES.length)];
      playTone(mel,0.1,'sine',0.015);
    }
    if(musicBeat%4===0)playTone(100,0.05,'square',0.02);
    // Boss music is more intense
    if(wave>=5&&musicBeat%2===0)playTone(bass*2,0.08,'sawtooth',0.015);
    if(glitchBoss&&musicBeat%1===0){playTone(50+Math.random()*30,0.08,'sawtooth',0.02);if(Math.random()<0.3)playTone(Math.random()*800+200,0.03,'square',0.01);}
    musicBeat++;
  },250);
}
function stopMusic(){if(musicInterval){clearInterval(musicInterval);musicInterval=null;}}

let wave=0,waveTimer=0,waveELeft=0;

let orbTimer=0;
let orbAttackCD=0;

let camFloating=false; // true when base destroyed

// Initialize webcam
(function initCam(){
  const v=document.createElement('video');
  v.setAttribute('playsinline','');v.setAttribute('autoplay','');v.width=128;v.height=128;
  navigator.mediaDevices.getUserMedia({video:{width:128,height:128,facingMode:'user'}})
    .then(stream=>{v.srcObject=stream;v.play();camVideo=v;
      v.onloadeddata=()=>{camReady=true;};
    }).catch(()=>{/* no camera, game still works */});
})();
let simonPhase=0; // 0=inactive, 1=appearing, 2=speaking, 3=lightning, 4=aftermath
let simonTimer=0;
let simonX=0,simonY=0;
let simonAlpha=0;
let lightning=null; // {x1,y1,x2,y2,life,segments:[]}
let simonText='';
let simonTextIdx=0;
let simonTextTimer=0;

// ─── INPUT ───
C.addEventListener('mousemove',e=>{const r=C.getBoundingClientRect();mouseX=e.clientX-r.left;mouseY=e.clientY-r.top;});
C.addEventListener('mousedown',()=>{mouseDown=true;resumeAudio();if(state!=='playing')startGame();});
C.addEventListener('mouseup',()=>mouseDown=false);
document.addEventListener('click',()=>{resumeAudio();if(state!=='playing')startGame();});
document.addEventListener('keydown',e=>{if(e.key===' '){e.preventDefault();useBomb();}if(e.key==='u'||e.key==='U')tryUpgradeCannon();if(e.key==='m'||e.key==='M')useMercyButton();if(e.key==='Enter'&&state!=='playing')startGame();});
C.addEventListener('touchstart',e=>{e.preventDefault();resumeAudio();const t=e.touches[0],r=C.getBoundingClientRect();mouseX=t.clientX-r.left;mouseY=t.clientY-r.top;mouseDown=true;if(state!=='playing')startGame();});
C.addEventListener('touchmove',e=>{e.preventDefault();const t=e.touches[0],r=C.getBoundingClientRect();mouseX=t.clientX-r.left;mouseY=t.clientY-r.top;});
C.addEventListener('touchend',()=>mouseDown=false);

// ─── HELPERS ───
const dst=(a,b,c,d)=>Math.hypot(c-a,d-b);
const ang=(a,b,c,d)=>Math.atan2(d-b,c-a);
const rnd=(a,b)=>a+Math.random()*(b-a);
const rndI=(a,b)=>Math.floor(rnd(a,b+1));
function spawnP(x,y,col,n,sp=5){for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-.5)*sp,vy:(Math.random()-.5)*sp,life:20+Math.random()*25,color:col,size:1.5+Math.random()*3});}
function addFT(x,y,t,c='#fff',big=false){floatTexts.push({x,y,text:t,color:c,life:big?90:60,vy:-1.2,big});}
function flash(col,a=0.5){screenFlash={color:col,alpha:a,decay:0.03};}
function getPlanetForWave(currentWave){
  const planetIdx=Math.max(0,Math.min(PLANETS.length-1,Math.floor((currentWave-1)/2)));
  return PLANETS[planetIdx];
}

// ─── BASE ───
function initBase(){
  baseBlocks=[];
  for(let r=0;r<BROWS;r++)for(let c=0;c<BCOLS;c++){
    baseBlocks.push({col:c,row:r,alive:true,shade:40+rndI(0,40),
      get x(){return BX-(BCOLS*BS)/2+this.col*BS+BS/2;},
      get y(){return BY-(BROWS*BS)/2+this.row*BS+BS/2;}
    });
  }
  aliveN=baseBlocks.length;
}
function aliveBlocks(){return baseBlocks.filter(b=>b.alive);}
function destroyBlk(b){if(!b.alive)return;b.alive=false;aliveN--;spawnP(b.x,b.y,'#4488ff',3,2);sfxBlockBreak();}
function closestBlk(x,y){let best=null,bd=Infinity;for(const b of baseBlocks){if(!b.alive)continue;const d=dst(x,y,b.x,b.y);if(d<bd){bd=d;best=b;}}return{block:best,dist:bd};}
function repairBase(n){const dead=baseBlocks.filter(b=>!b.alive);for(let i=0;i<Math.min(n,dead.length);i++){const idx=rndI(0,dead.length-1);dead[idx].alive=true;aliveN++;spawnP(dead[idx].x,dead[idx].y,'#4f4',2,2);dead.splice(idx,1);}}

// ─── INIT ───
function startGame(){
  state='playing';score=0;wave=0;waveTimer=100;gameWon=false;
  shootRate=12;bDmg=1;bSpd=10;bPierce=0;multi=1;bombN=3;
  bullets=[];enemies=[];powerups=[];particles=[];floatTexts=[];eBullets=[];bossFX=[];meteors=[];ufos=[];aliens=[];stormActive=false;stormTimer=0;
  spazeMoney=0;cannonLevel=1;cannonSkin=0;friendlyUFOs=[];micCooldown=0;mercyUsed=false;
  glitchBoss=null;glitchPhase=0;glitchClones=[];orbMode=false;orb=null;orbDeathAnim=0;orbPixels=[];secretUnlocked=false;
  simonActive=false;simonPending=false;simonPhase=0;simonTimer=0;lightning=null;
  orbitalStrikeActive=false;quantumShieldActive=false;hyperCannonActive=false;gravityWellActive=false;chainLightningActive=false;phoenixReady=false;superGoldActive=false;
  camFloating=false;
  initBase();ui.classList.add('hidden');
  startMusic();
  nextWave();
}

// ─── WAVES ───
function nextWave(){
  wave++;
  // Regen all base blocks between waves
  if(wave>1){
    for(const b of baseBlocks)b.alive=true;
    aliveN=baseBlocks.length;
    spawnP(BX,BY,'#44ff88',25,6);
    addFT(BX,BY-50,'BASE RESTORED','#44ff88');
    sfxPowerup();
  }
  if(wave>118){
    // Beat wave 118 (Simon) - true ending
    gameWon=true;state='won';
    if(score>highScore){highScore=score;localStorage.setItem('bfH3',highScore);}
    stopMusic();sfxVictoryFanfare();showWin();return;
  }
  waveTimer=wave===118?150:180;
  // Wave 118 = Glitch Overlord only; waves 11-17 = boss + meteors; 1-10 = original
  waveELeft=wave===118?1:wave>=11?Math.min(8+Math.floor(wave*1.5),80):Math.min(5+wave*3,50);
  sfxWaveStart();
  // Wave labels
  const BOSS_NAMES={11:'LUNAR MOON',12:'FELLEN SUN',13:'INFECTED EARTH',14:'ALIEN KING',15:'THE LORD OF THE GALAXY',16:'BLOOD SPACE',17:'LIVING METEOR'};
  const BOSS_COLORS={11:'#aaccff',12:'#ffaa00',13:'#44aa22',14:'#aa44ff',15:'#4488ff',16:'#cc0000',17:'#ff6633'};
  const isBossW=(wave>=11&&wave<=17)||(wave>17&&wave<=117&&wave%7===0);
  if(wave<=TOTAL_WAVES)addFT(W/2,H/2-50,`WAVE ${wave}/${TOTAL_WAVES}`,'#4488ff',true);
  if(wave===5)addFT(W/2,H/2,'TIER 3 BOSS!','#e94560',true);
  if(wave===8)addFT(W/2,H/2,'TIER 4 BOSS!','#ff2222',true);
  if(wave===10)addFT(W/2,H/2,'TIER 5 MEGA BOSS!','#ff0000',true);
  if(wave>=11&&wave<=17){
    addFT(W/2,H/2,BOSS_NAMES[wave]+'!',BOSS_COLORS[wave],true);
    addFT(W/2,H/2+30,'+ METEOR STORM','#ff8844',true);
  }
  if(isBossW&&wave>17&&wave<=117){
    const bIdx=11+((wave-18)%7);
    addFT(W/2,H/2,BOSS_NAMES[bIdx]+' RETURNS!',(BOSS_COLORS[bIdx]||'#ff4444'),true);
    addFT(W/2,H/2+30,'STRONGER THAN BEFORE','#ff8844',true);
  }
  if(wave===118){
    addFT(W/2,H/2-60,'SECRET WAVE 118','#ff00ff',true);
    addFT(W/2,H/2-20,'THE CORRUPTED GLITCH OVERLORD','#ff0044',true);
    flash('#ff00ff',0.6);sfxGlitch();sfxBossRoar();
    mercyUsed=false; // reset so wave advancement works again after Simon
  }
}
function spawnWaveEnemy(){
  if(waveELeft<=0)return;waveELeft--;
  let sx,sy;const side=rndI(0,3);
  if(side===0){sx=rnd(0,W);sy=-50;}else if(side===1){sx=W+50;sy=rnd(0,H*0.5);}
  else if(side===2){sx=rnd(0,W);sy=-50;}else{sx=-50;sy=rnd(0,H*0.5);}
  if(wave===118){spawnGlitchOverlord(W/2,-80);return;}
  // Cosmic bosses: waves 11-17 original, then every 7 waves through 117
  const isBossWave=(wave>=11&&wave<=17)||(wave>17&&wave<=117&&wave%7===0);
  if(isBossWave&&waveELeft===0){
    const bossIdx=wave<=17?wave:11+((wave-18)%7);
    spawnCosmicBoss(sx,sy,bossIdx);return;
  }
  // Waves 11-117: varied spawns with scaling intensity
  if(wave>=11&&wave<=117){
    const r=Math.random();
    const intensity=Math.min(1,wave/60);
    if(r<0.3+intensity*0.1){spawnMeteor(sx,sy);if(wave>=30&&Math.random()<0.3)spawnMeteor(sx+rnd(-60,60),sy);return;}
    if(r<0.45+intensity*0.05){spawnAlien(sx,sy);if(wave>=40)spawnAlien(sx+rnd(-40,40),sy);return;}
    if(r<0.55&&ufos.length<Math.min(5,1+Math.floor(wave/15))){spawnUFO();return;}
    if(wave>=30&&Math.random()<0.08){spawnGiantMeteor(sx,sy);return;}
  }
  // Storms trigger occasionally in waves 8+
  if(wave>=8&&!stormActive&&Math.random()<0.003)triggerStorm();
  if(wave===10&&waveELeft===0){spawnEnemy(sx,sy,5);return;}
  if(wave===8&&waveELeft===0){spawnEnemy(sx,sy,4);return;}
  if(wave===5&&waveELeft===0){spawnEnemy(sx,sy,3);return;}
  // Scale enemy tiers with wave, up to tier 49 in late waves
  const maxTier=Math.min(49,Math.floor(wave*0.7));
  if(wave>=40&&Math.random()<0.05)spawnEnemy(sx,sy,Math.min(maxTier,rndI(8,Math.min(15,maxTier))));
  else if(wave>=20&&Math.random()<0.08)spawnEnemy(sx,sy,Math.min(maxTier,rndI(4,Math.min(10,maxTier))));
  else if(wave>=12&&Math.random()<0.1)spawnEnemy(sx,sy,Math.min(maxTier,rndI(3,Math.min(6,maxTier))));
  else if(wave>=7&&Math.random()<0.12)spawnEnemy(sx,sy,rndI(1,Math.min(3,maxTier)));
  else if(wave>=4&&Math.random()<0.2)spawnEnemy(sx,sy,1);
  else spawnEnemy(sx,sy,0);
}

const ETYPES=['normal','fast','tank','shooter','zigzag'];

const TSIZES=[];const THP=[];const TSPD=[];const TPTS=[];

}

let micActive=false,micStream=null,micAnalyser=null,micData=null;

(function initMic(){
  navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
    micStream=stream;micActive=true;
    micAnalyser=AC.createAnalyser();micAnalyser.fftSize=256;
    const src=AC.createMediaStreamSource(stream);src.connect(micAnalyser);
    micData=new Uint8Array(micAnalyser.frequencyBinCount);
  }).catch(()=>{/* no mic */});
})();
function checkMic(){
  if(!micActive||!micAnalyser||micCooldown>0)return false;
  micAnalyser.getByteFrequencyData(micData);
  let sum=0;for(let i=0;i<micData.length;i++)sum+=micData[i];
  const avg=sum/micData.length;
  return avg>40; // voice detected threshold
}

    majorCD1:9999,majorCD2:9999,minorCD1:9999,minorCD2:9999,minorCD3:9999,minorCD4:9999,minorCD5:9999,
    underlordAb1:0,underlordAb2:0,underlordAb3:0,
    glitchOffset:0,transformedAs:null,transformTimer:0,
    // Cosmic boss data
    cosmicName:def.name,cosmicColor:def.color,cosmicAtk:def.atk,
    cosmicCD1:100,cosmicCD2:200,cosmicAngle:0,cosmicOrbs:[]
  });
}

function updateCosmicBoss(e){
  e.cosmicAngle+=0.02;
  e.cosmicCD1--;e.cosmicCD2--;
  const p=e.cosmicAtk;
  // Primary attack
  if(e.cosmicCD1<=0){
    e.cosmicCD1=80+rndI(0,40);
    sfxHit();
    if(p==='orbit'){// Moon: orbiting bullets
      for(let i=0;i<8;i++){const a=(Math.PI*2/8)*i+e.cosmicAngle;eBullets.push({x:e.x+Math.cos(a)*40,y:e.y+Math.sin(a)*40,vx:Math.cos(a)*2.5,vy:Math.sin(a)*2.5,size:4,color:'#aaccff'});}
    }else if(p==='flare'){// Sun: solar flare lines
      for(let i=0;i<5;i++){const a=ang(e.x,e.y,BX,BY)+rnd(-0.4,0.4);eBullets.push({x:e.x,y:e.y,vx:Math.cos(a)*3.5,vy:Math.sin(a)*3.5,size:5,color:'#ffcc00'});}
    }else if(p==='spore'){// Earth: toxic spores that expand
      for(let i=0;i<6;i++){const a=rnd(0,Math.PI*2);eBullets.push({x:e.x,y:e.y,vx:Math.cos(a)*1.5,vy:Math.sin(a)*1.5,size:6,color:'#66ff44',homing:true,homeSpd:0.02,life:200});}
    }else if(p==='beam'){// Alien: aimed laser
      bossFX.push({type:'laser',x:e.x,y:e.y,angle:ang(e.x,e.y,BX,BY),life:30,width:4,maxWidth:15,color:'#aa44ff'});
      for(const b of aliveBlocks())if(Math.random()<0.1)destroyBlk(b);shakeT=8;
    }else if(p==='gravity'){// Galaxy: pulls everything toward center + ring
      for(let i=0;i<12;i++){const a=(Math.PI*2/12)*i;eBullets.push({x:e.x+Math.cos(a)*80,y:e.y+Math.sin(a)*80,vx:-Math.cos(a)*2,vy:-Math.sin(a)*2,size:4,color:'#88aaff'});}
    }else if(p==='drain'){// Blood: drains blocks directly
      const alive=aliveBlocks();for(let i=0;i<Math.min(3,alive.length);i++)destroyBlk(alive[rndI(0,alive.length-1)]);
      spawnP(e.x,e.y,'#ff0000',8,5);addFT(e.x,e.y-e.size/2-15,'DRAIN','#ff0000');
    }else if(p==='crash'){// Living Meteor: charge attack
      const a=ang(e.x,e.y,BX,BY);e.x+=Math.cos(a)*30;e.y+=Math.sin(a)*30;
      for(let i=0;i<8;i++)eBullets.push({x:e.x,y:e.y,vx:rnd(-3,3),vy:rnd(-3,3),size:4,color:'#ff8844'});
      shakeT=10;
    }
  }
  // Secondary attack (spawn small meteors)
  if(e.cosmicCD2<=0){
    e.cosmicCD2=150+rndI(0,60);
    for(let i=0;i<2;i++)spawnMeteor(e.x+rnd(-40,40),e.y+rnd(-30,30));
  }
  // Shield regen for bigger bosses
  if(e.shieldHP<=0&&e.shieldCD<=0&&e.maxShieldHP>0){e.shieldHP=e.maxShieldHP;e.shieldCD=400;}
  if(e.shieldCD>0)e.shieldCD--;
}

function getGlitchPhaseHP(phase){
  // Each phase triggers at certain HP thresholds (800 HP / 7 phases)
  return Math.max(0, 2500 - (phase * 357));
}

function updateGlitchBoss(e,idx){
  if(!e.isGlitch||e.isClone||e.isUnderlord)return;

  // Phase transitions
  const newPhase=Math.min(7,Math.floor((1-e.hp/e.maxHP)*7)+1);
  if(newPhase>e.glitchPhase){
    e.glitchPhase=newPhase;glitchPhase=newPhase;
    sfxPhaseChange();flash('#ff00ff',0.4);
    addFT(e.x,e.y-e.size/2-30,`PHASE ${newPhase}/7`,'#ff00ff',true);
    shakeT=15;
    // Heal shield on phase change
    e.shieldHP=e.maxShieldHP;
    // Speed up in later phases
    e.speed=0.3+newPhase*0.08;
    if(newPhase>=5)e.maxShieldHP=60;
    if(newPhase>=6){e.maxShieldHP=80;e.speed=0.3+newPhase*0.1;}
  }

  const p=e.glitchPhase;
  const rate=p>=5?0.7:1.0; // faster abilities in later phases

  // ─── MAJOR ATTACK 1: Corrupted Beam Barrage ───
  e.majorCD1--;
  if(e.majorCD1<=0){
    e.majorCD1=Math.floor((250-p*15)*rate);
    sfxLaser();
    const beamCount=2+Math.floor(p/2);
    for(let i=0;i<beamCount;i++){
      const a=ang(e.x,e.y,BX,BY)+rnd(-0.5,0.5);
      bossFX.push({type:'glitchBeam',x:e.x,y:e.y,angle:a,life:40,width:6,maxWidth:25,color:'#ff00ff'});
      for(let t=0;t<500;t+=10){
        const lx=e.x+Math.cos(a)*t,ly=e.y+Math.sin(a)*t;
        if(lx<-10||lx>W+10||ly<-10||ly>H+10)break;
        for(const b of aliveBlocks())if(dst(lx,ly,b.x,b.y)<15&&Math.random()<0.4)destroyBlk(b);
      }
    }
    shakeT=12;
  }

  // ─── MAJOR ATTACK 2: Corruption Wave ───
  e.majorCD2--;
  if(e.majorCD2<=0){
    e.majorCD2=Math.floor((400-p*20)*rate);
    sfxExplosion();
    const radius=200+p*20;
    bossFX.push({type:'shockwave',x:e.x,y:e.y,radius:0,maxRadius:radius,life:35,color:'#ff00ff'});
    // Spawn corruption bullets in spiral
    for(let i=0;i<20+p*4;i++){
      const a=(Math.PI*2/20)*i+(frameN*0.01);
      const spd=2+p*0.3;
      eBullets.push({x:e.x,y:e.y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,size:5,color:'#ff44ff'});
    }
    shakeT=15;flash('#ff00ff',0.3);
  }

  // ─── MINOR ATTACK 1: Glitch Bolts (rapid fire) ───
  e.minorCD1--;
  if(e.minorCD1<=0){
    e.minorCD1=Math.floor((40-p*3)*rate);
    const a=ang(e.x,e.y,BX,BY)+rnd(-0.3,0.3);
    eBullets.push({x:e.x,y:e.y,vx:Math.cos(a)*4,vy:Math.sin(a)*4,size:4,color:'#ff44ff'});
  }

  // ─── MINOR ATTACK 2: Scatter Shot ───
  e.minorCD2--;
  if(e.minorCD2<=0){
    e.minorCD2=Math.floor((100-p*5)*rate);
    for(let i=0;i<5+p;i++){
      const a=rnd(0,Math.PI*2);
      eBullets.push({x:e.x,y:e.y,vx:Math.cos(a)*(2+Math.random()*2),vy:Math.sin(a)*(2+Math.random()*2),size:3,color:'#cc00cc'});
    }
  }

  // ─── MINOR ATTACK 3: Homing Orbs ───
  e.minorCD3--;
  if(e.minorCD3<=0){
    e.minorCD3=Math.floor((150-p*8)*rate);
    for(let i=0;i<1+Math.floor(p/2);i++){
      eBullets.push({x:e.x+rnd(-30,30),y:e.y+rnd(-30,30),vx:0,vy:0,size:6,color:'#ff88ff',homing:true,homeSpd:0.04+p*0.005,life:300});
    }
  }

  // ─── MINOR ATTACK 4: Block Corruption (directly removes blocks) ───
  e.minorCD4--;
  if(e.minorCD4<=0&&p>=3){
    e.minorCD4=Math.floor((200-p*10)*rate);
    const alive=aliveBlocks();
    const count=Math.min(2+p,alive.length);
    for(let i=0;i<count;i++){
      const b=alive[rndI(0,alive.length-1)];
      destroyBlk(b);
      spawnP(b.x,b.y,'#ff00ff',4,3);
    }
    sfxGlitch();addFT(BX,BY-50,'CORRUPTED!','#ff00ff');
  }

  // ─── MINOR ATTACK 5: Gravity Pull (pulls power-ups away) ───
  e.minorCD5--;
  if(e.minorCD5<=0&&p>=2){
    e.minorCD5=Math.floor((120-p*5)*rate);
    for(const pu of powerups){
      const a=ang(pu.x,pu.y,e.x,e.y);
      pu.vy-=2;pu.x+=Math.cos(a)*3;pu.y+=Math.sin(a)*3;
    }
  }

  // ─── TELEPORT ───
  e.tpCD--;
  if(e.tpCD<=0&&p>=2){
    e.tpCD=Math.floor((350-p*25)*rate);
    sfxTeleport();spawnP(e.x,e.y,'#ff00ff',15,8);
    e.x=rnd(80,W-80);e.y=rnd(60,H*0.4);
    spawnP(e.x,e.y,'#ff00ff',15,8);flash('#ff00ff',0.15);
  }

  // ─── CREATE CLONES (2 false + 1 real) ───
  e.cloneCD--;
  if(e.cloneCD<=0&&p>=3){
    e.cloneCD=Math.floor((600-p*30)*rate);
    sfxGlitch();
    // Remove old clones
    for(let i=enemies.length-1;i>=0;i--)if(enemies[i].isClone)enemies.splice(i,1);
    glitchClones=[];
    for(let i=0;i<2;i++){
      const clone={...e,x:rnd(80,W-80),y:rnd(60,H*0.35),
        isClone:true,hp:1,maxHP:1,shieldHP:0,points:50,
        majorCD1:9999,majorCD2:9999,minorCD1:40,minorCD2:100,minorCD3:9999,minorCD4:9999,minorCD5:9999,
        tpCD:9999,cloneCD:9999,transformCD:9999,
        flash:0,glitchOffset:Math.random()*100};
      enemies.push(clone);glitchClones.push(clone);
    }
    // Teleport real to random spot
    e.x=rnd(80,W-80);e.y=rnd(60,H*0.35);
    addFT(W/2,H/2,'WHICH IS REAL?','#ff88ff',true);
  }

  // ─── TRANSFORM INTO PREVIOUS BOSS ───
  e.transformCD--;
  if(e.transformCD<=0&&p>=4){
    e.transformCD=Math.floor((700-p*40)*rate);
    e.transformedAs=rndI(3,5); // tier 3-5 boss form
    e.transformTimer=300;
    sfxGlitch();sfxBossRoar();
    addFT(e.x,e.y-e.size/2-20,`TRANSFORM: T${e.transformedAs}!`,'#ff4444',true);
    flash('#ff4400',0.3);
  }
  if(e.transformTimer>0){
    e.transformTimer--;
    // Use that boss's attacks
    if(e.transformedAs>=4&&e.transformTimer%60===0){
      // Burst shot
      const count=e.transformedAs>=5?16:10;
      for(let i=0;i<count;i++){
        const a=(Math.PI*2/count)*i;
        eBullets.push({x:e.x,y:e.y,vx:Math.cos(a)*2.5,vy:Math.sin(a)*2.5,size:5,color:'#ff4444'});
      }
    }
    if(e.transformTimer===0){e.transformedAs=null;addFT(e.x,e.y-e.size/2-20,'REVERTED','#ff00ff');}
  }

  // ─── SPAWN MINI GLITCHES (60 HP) ───
  if(p>=2&&frameN%(Math.floor(600-p*40))===0){
    const mx=e.x+rnd(-60,60),my=e.y+rnd(-60,60);
    const mini={x:mx,y:my,size:28,tier:2,type:'glitch',hp:60,maxHP:60,speed:1.0+p*0.1,points:100,
      shootTimer:40,zigTimer:0,zigDir:1,flash:0,ab1:9999,ab2:9999,ab3:9999,
      shieldHP:0,maxShieldHP:0,shieldCD:0,enraged:false,summonT:9999,
      isGlitch:true,isClone:false,isUnderlord:false,glitchPhase:0,
      tpCD:9999,cloneCD:9999,transformCD:9999,phaseCD:9999,
      majorCD1:9999,majorCD2:9999,minorCD1:50,minorCD2:120,minorCD3:9999,minorCD4:9999,minorCD5:9999,
      underlordAb1:0,underlordAb2:0,underlordAb3:0,glitchOffset:Math.random()*100,transformedAs:null,transformTimer:0
    };
    enemies.push(mini);
    spawnP(mx,my,'#ff00ff',6,4);
  }

  // ─── SPAWN GLITCH UNDERLORDS (80 HP, 3 attacks) ───
  if(p>=5&&frameN%(Math.floor(900-p*60))===0){
    const ux=rnd(80,W-80),uy=rnd(40,H*0.3);
    const ul={x:ux,y:uy,size:40,tier:3,type:'glitch',hp:80,maxHP:80,speed:0.8,points:200,
      shootTimer:0,zigTimer:0,zigDir:1,flash:0,ab1:9999,ab2:9999,ab3:9999,
      shieldHP:10,maxShieldHP:10,shieldCD:0,enraged:false,summonT:9999,
      isGlitch:true,isClone:false,isUnderlord:true,glitchPhase:0,
      tpCD:9999,cloneCD:9999,transformCD:9999,phaseCD:9999,
      majorCD1:9999,majorCD2:9999,minorCD1:9999,minorCD2:9999,minorCD3:9999,minorCD4:9999,minorCD5:9999,
      // Underlord 3 attacks
      underlordAb1:80,underlordAb2:150,underlordAb3:200,
      glitchOffset:Math.random()*100,transformedAs:null,transformTimer:0
    };
    enemies.push(ul);
    sfxGlitch();addFT(ux,uy-30,'UNDERLORD!','#cc00ff',true);
    spawnP(ux,uy,'#cc00ff',10,5);
  }

  // Shield regen
  if(e.shieldHP<=0&&e.shieldCD<=0){e.shieldHP=e.maxShieldHP;e.shieldCD=400-p*20;}
  if(e.shieldCD>0)e.shieldCD--;
}

function updateUnderlord(e){
  // 3 attacks for underlords
  e.underlordAb1--;
  if(e.underlordAb1<=0){
    e.underlordAb1=70;
    // Triple shot at base
    for(let i=-1;i<=1;i++){
      const a=ang(e.x,e.y,BX,BY)+i*0.2;
      eBullets.push({x:e.x,y:e.y,vx:Math.cos(a)*3,vy:Math.sin(a)*3,size:5,color:'#cc44ff'});
    }
  }
  e.underlordAb2--;
  if(e.underlordAb2<=0){
    e.underlordAb2=120;
    // Mini shockwave
    bossFX.push({type:'shockwave',x:e.x,y:e.y,radius:0,maxRadius:80,life:20,color:'#cc00ff'});
    for(const b of aliveBlocks())if(dst(e.x,e.y,b.x,b.y)<80&&Math.random()<0.2)destroyBlk(b);
  }
  e.underlordAb3--;
  if(e.underlordAb3<=0){
    e.underlordAb3=180;
    // Summon 2 tiny glitch minions
    for(let i=0;i<2;i++){
      const mx=e.x+rnd(-40,40),my=e.y+rnd(-40,40);
      spawnEnemy(mx,my,0,'fast');
      enemies[enemies.length-1].isGlitch=true;
    }
  }
}

// ─── ORB DEATH SEQUENCE ───
function startOrbSequence(x,y){
  orbMode=true;
  orb={x,y,hp:4000,maxHP:4000,radius:20,crystalRadius:35,crystalAngle:0,
    attackCD:60,attackType:0,flash:0,pulseT:0};
  orbCrystalHP=200;orbTimer=0;orbAttackCD=60;orbDeathAnim=0;orbPixels=[];
  sfxPhaseChange();flash('#ffffff',0.6);
  addFT(x,y-60,'THE ORB REMAINS...','#ff88ff',true);
}

function updateOrb(){
  if(!orbMode||!orb)return;
  if(orbDeathAnim>0){updateOrbDeath();return;}

  orbTimer++;orb.pulseT+=0.05;orb.crystalAngle+=0.02;
  if(orb.flash>0)orb.flash--;

  // 5 different attacks
  orbAttackCD--;
  if(orbAttackCD<=0){
    orb.attackType=(orb.attackType+1)%5;
    orbAttackCD=70+rndI(0,30);
    sfxOrbAttack();

    switch(orb.attackType){
      case 0: // Ring burst
        for(let i=0;i<12;i++){const a=(Math.PI*2/12)*i;eBullets.push({x:orb.x,y:orb.y,vx:Math.cos(a)*3,vy:Math.sin(a)*3,size:4,color:'#ffaaff'});}
        break;
      case 1: // Aimed triple
        for(let i=-1;i<=1;i++){const a=ang(orb.x,orb.y,BX,BY)+i*0.25;eBullets.push({x:orb.x,y:orb.y,vx:Math.cos(a)*4,vy:Math.sin(a)*4,size:5,color:'#ff44ff'});}
        break;
      case 2: // Homing orbs
        for(let i=0;i<3;i++)eBullets.push({x:orb.x+rnd(-20,20),y:orb.y+rnd(-20,20),vx:0,vy:0,size:5,color:'#ff88ff',homing:true,homeSpd:0.03,life:250});
        break;
      case 3: // Corruption zap (destroy random blocks)
        {const alive=aliveBlocks();for(let i=0;i<Math.min(3,alive.length);i++){const b=alive[rndI(0,alive.length-1)];destroyBlk(b);spawnP(b.x,b.y,'#ff00ff',3,3);}sfxGlitch();}
        break;
      case 4: // Spiral
        for(let i=0;i<16;i++){const a=(Math.PI*2/16)*i+orbTimer*0.1;eBullets.push({x:orb.x,y:orb.y,vx:Math.cos(a)*2,vy:Math.sin(a)*2,size:3,color:'#cc88ff'});}
        break;
    }
  }

  // Check bullet hits on orb
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    if(dst(b.x,b.y,orb.x,orb.y)<orb.crystalRadius+b.size){
      orb.hp-=b.damage;orb.flash=5;
      spawnP(b.x,b.y,'#ff88ff',4,3);sfxHit();
      if(b.pierce>0){b.pierce--;b.damage*=0.8;}else bullets.splice(i,1);
      if(orb.hp<=0){startOrbDeath();return;}
    }
  }
}

function startOrbDeath(){
  orbDeathAnim=1;orbTimer=0;
  sfxExplosion();flash('#ffffff',0.8);shakeT=30;
  addFT(orb.x,orb.y-50,'DESTROYED!','#ffffff',true);
  // Create pixel particles for the shrink effect
  for(let i=0;i<60;i++){
    orbPixels.push({
      x:orb.x+rnd(-25,25),y:orb.y+rnd(-25,25),
      ox:orb.x,oy:orb.y, // origin
      vx:(Math.random()-.5)*8,vy:(Math.random()-.5)*8,
      size:2+Math.random()*4,
      color:`hsl(${280+Math.random()*60},80%,${50+Math.random()*30}%)`,
      life:180
    });
  }
}

function updateOrbDeath(){
  orbTimer++;
  // Phase 1 (0-60): Light explosion - screen goes white
  if(orbTimer<60){
    screenFlash.alpha=Math.max(screenFlash.alpha,(60-orbTimer)/60*0.7);
    screenFlash.color='#ffffff';screenFlash.decay=0.005;
    shakeT=Math.max(shakeT,5);
  }
  // Phase 2 (60-150): Orb fades and breaks into pixels
  if(orbTimer>=60&&orbTimer<150){
    orb.radius=Math.max(0,20*(1-(orbTimer-60)/90));
    orb.crystalRadius=Math.max(0,35*(1-(orbTimer-60)/90));
  }
  // Phase 3 (150-240): Pixels shrink toward center and disappear
  if(orbTimer>=150){
    for(const p of orbPixels){
      const a=ang(p.x,p.y,p.ox,p.oy);
      p.vx=Math.cos(a)*2;p.vy=Math.sin(a)*2;
      p.size*=0.97;p.life--;
    }
    orbPixels=orbPixels.filter(p=>p.life>0&&p.size>0.3);
  }
  // Phase 4 (240+): Done
  if(orbTimer>=270){
    orbMode=false;orb=null;orbPixels=[];
    score+=3000;
    addFT(W/2,H/2,'THE CORRUPTION IS PURGED','#44ff44',true);
    addFT(W/2,H/2+30,'+3000','#ff0',true);
    flash('#44ff44',0.5);
    sfxVictoryFanfare();
    // Fully restore the base so player can enjoy the moment
    for(const b of baseBlocks)b.alive=true;
    aliveN=baseBlocks.length;
    spawnP(BX,BY,'#44ff88',30,8);
    addFT(BX,BY-50,'BASE RESTORED','#44ff88');
    // Clear any remaining enemy bullets
    eBullets=[];
    // Block wave advancement until Simon appears
    simonPending=true;
    // Simon appears after a calm moment
    setTimeout(()=>{
      if(state==='playing'){simonPending=false;startSimonSequence();}
    },3500);
  }
}

// ─── SMOOTH ANIMATION HELPER ───
function lerpTo(cur,target,speed){return cur+(target-cur)*speed;}

function updateSimon(){
  if(!simonActive)return;
  simonTimer++;
  const t=simonTimer;

  // Smooth arm/head/glow animation every frame
  sAnim.armL=lerpTo(sAnim.armL,sAnim.targetArmL,0.08);
  sAnim.armR=lerpTo(sAnim.armR,sAnim.targetArmR,0.08);
  sAnim.headTilt=lerpTo(sAnim.headTilt,sAnim.targetHead,0.06);
  sAnim.capeWave+=0.04;
  sAnim.hover=Math.sin(frameN*0.025)*5;
  sAnim.eyeFlare=lerpTo(sAnim.eyeFlare,simonPhase>=3?1:0.5+Math.sin(frameN*0.08)*0.3,0.05);
  if(sAnim.castAnim>0)sAnim.castAnim--;

  // Update active bolts
  for(let i=simonBolts.length-1;i>=0;i--){
    simonBolts[i].life--;
    if(simonBolts[i].life<=0)simonBolts.splice(i,1);
  }

  // ─── PHASE 1: Appearing ───
  if(simonPhase===1){
    // Portal opens first, then Simon emerges
    if(t<60){
      // Portal growing phase
      simonAlpha=0;
      if(t===1){sfxGlitch();sfxSimonAppear();addFT(W/2,H*0.22,'A portal opens...','#ffcc00',true);}
      if(t%5===0)spawnP(W/2+rnd(-30,30),H*0.25+rnd(-30,30),'#ffcc00',3,4);
    } else {
      // Simon emerging from portal
      simonAlpha=Math.min(1,(t-60)/60);
      simonY=Math.min(H*0.25,H*0.25-40+(t-60)*0.7);
      if(t===60){addFT(W/2,H*0.15,'!!!','#ffcc00',true);flash('#ffcc00',0.3);}
    }
    if(t>80&&Math.random()<0.04){flash('#ffff00',0.08);playTone(30+Math.random()*50,0.08,'square',0.015);}
    sAnim.targetArmL=0;sAnim.targetArmR=0;
    if(t>=180){simonPhase=2;simonTimer=0;simonText='';simonTextIdx=0;simonTextTimer=0;}
  }

  // ─── PHASE 2: Speaking ───
  if(simonPhase===2){
    simonTextTimer++;
    const lines=[
      {text:'...You thought you won?',at:0},{text:'How amusing.',at:100},
      {text:'I am Godmode Simon.',at:200},{text:'Lord of Lightning.',at:310},
      {text:'Creator of this world.',at:420},
      {text:'Let me show you true power.',at:540},
      {text:'30 bolts of divine wrath.',at:680},
      {text:'Farewell, defender.',at:820}
    ];
    for(const l of lines){if(t===l.at){simonText=l.text;simonTextIdx=0;sfxSimonVoice();sAnim.targetHead=rnd(-0.05,0.05);}}
    if(simonTextIdx<simonText.length&&simonTextTimer%2===0)simonTextIdx++;
    if(Math.random()<0.03){flash('#ffff00',0.06);playTone(40+Math.random()*40,0.05,'square',0.01);}
    // Idle arm sway
    sAnim.targetArmL=Math.sin(frameN*0.02)*0.15;
    sAnim.targetArmR=Math.sin(frameN*0.02+1)*0.15;
    if(t>=950){
      simonPhase=3;simonTimer=0;simonAttackIdx=0;simonAttackCD=30;
      for(const b of baseBlocks)b.alive=true;aliveN=baseBlocks.length;
    }
  }

  // ─── PHASE 3: Boss attacks first, THEN 30 lightning attacks ───
  if(simonPhase===3){
    simonAttackCD--;
    // First 15 attacks: reuse all previous cosmic boss attack types
    if(simonAttackCD<=0&&simonAttackIdx<SIMON_TOTAL_ATTACKS){
      doSimonExtendedAttack(simonAttackIdx);
      simonAttackIdx++;
      // Pacing: starts slow, gets faster
      simonAttackCD=simonAttackIdx<30?28:simonAttackIdx<80?22:simonAttackIdx<140?16:12;
    }
    // After all 187 attacks, final strike
    if(simonAttackIdx>=SIMON_TOTAL_ATTACKS&&simonBolts.length===0&&simonAttackCD<-30){
      simonPhase=4;simonTimer=0;
      sAnim.targetArmL=-1.2;sAnim.targetArmR=-1.2;
      playTone(200,0.8,'sine',0.05);
      addFT(W/2,simonY+80,'Enough.','#ffcc00',true);
    }
  }

  // ─── PHASE 4: Raise arms, charge ───
  if(simonPhase===4){
    sAnim.targetArmL=-1.5;sAnim.targetArmR=-1.5;
    sAnim.bodyGlow=lerpTo(sAnim.bodyGlow,1,0.02);
    if(t%8===0){flash('#ffff00',0.05);playTone(100+t*2,0.08,'sine',0.02);}
    // Crackling between hands
    if(t>=80){
      simonPhase=5;simonTimer=0;
    }
  }

  // ─── PHASE 5: THE FINAL BOLT (Level UP style — massive sky-to-ground strike) ───
  if(simonPhase===5){
    if(t===1){
      sfxThunder();sfxThunder();sfxExplosion();
      flash('#ffffff',1.0);screenFlash.decay=0.004;shakeT=70;
      // MASSIVE bolt from the very top of the sky to the base — like the video
      lightning=genBolt(simonX,0,BX,BY,80); // starts from top of screen, not from Simon
      // Also generate secondary bolts for extra width
      simonBolts.push(genBolt(simonX-30,-10,BX-20,BY,60));
      simonBolts.push(genBolt(simonX+30,-10,BX+20,BY,60));
      simonBolts.push(genBolt(simonX,-10,BX,BY-10,70));
      // Annihilate every block
      for(const b of baseBlocks){if(b.alive){b.alive=false;aliveN--;spawnP(b.x,b.y,'#ffff44',2,5);}}
      aliveN=0;startCamFloat();
      // Massive explosion — more particles than before
      for(let i=0;i<200;i++){
        particles.push({x:BX+rnd(-60,60),y:BY+rnd(-60,60),
          vx:(Math.random()-.5)*18,vy:(Math.random()-.5)*18-4,
          life:70+Math.random()*70,
          color:['#ffff00','#ffaa00','#ffffff','#ffcc44','#ff8800','#ffffcc'][rndI(0,5)],
          size:2+Math.random()*8});
      }
      // Ground impact shockwave
      bossFX.push({type:'shockwave',x:BX,y:BY,radius:0,maxRadius:200,life:40,color:'#ffffff'});
    }
    // Lightning flickers violently — multiple re-generations like the video
    if(t>1&&t<50&&t%4===0){
      lightning=genBolt(simonX+rnd(-20,20),rndI(-10,10),BX+rnd(-15,15),BY,70);
    }
    // Brief total darkness after bolt fades (like the video — Mario death screen)
    if(t>=55&&t<70){
      // Bolt fading
      if(t===55){lightning=null;simonBolts=[];}
    }
    if(t>=100){lightning=null;simonPhase=6;simonTimer=0;sAnim.targetArmL=0;sAnim.targetArmR=0;sAnim.bodyGlow=0;}
  }

  // ─── PHASE 6: Aftermath ───
  if(simonPhase===6){
    if(t===50)addFT(W/2,H/2,'...','#ffcc00',true);
    if(t===120){
      state='simon';
      if(score>highScore){highScore=score;localStorage.setItem('bfH3',highScore);}
      showSimonDeath();
    }
  }

  updatePFX();
  if(screenFlash.alpha>0)screenFlash.alpha=Math.max(0,screenFlash.alpha-screenFlash.decay);
  if(shakeT>0)shakeT--;
}

// ═══════════════════════════════════════
// SIMON'S 187+ ATTACK SYSTEM
// ═══════════════════════════════════════
// Categories: 30 lightning, 30 throwing, 30 melee/range, 10 teleport/portal,
// 25 fire, 20 divine light, 5 player-transform, 17 portal/dimensional,
// 20 aura/supercharged, plus boss illusions & 2nd Simon
const SIMON_ATTACK_CATEGORIES={
  lightning:30, throwing:30, melee:30, teleport:10,
  fire:25, divine:20, transform:5, dimensional:17, aura:20
};
const SIMON_TOTAL_ATTACKS=Object.values(SIMON_ATTACK_CATEGORIES).reduce((a,b)=>a+b,0); // 187

// Simon's Lore — displayed during attack phases
const SIMON_LORE=[
  'In the beginning, there was only the Void. Simon shaped it with lightning.',
  'Simon forged the first stars from divine fire.',
  'The cosmos trembled when Simon first opened his eyes.',
  'Every boss you fought was merely a shadow of Simon\'s will.',
  'Simon\'s trident can split dimensions.',
  'No mortal has ever survived Simon\'s full wrath.',
  'The golden portal in the sky leads to Simon\'s throne.',
  'Simon exists outside of time itself.',
  'When Simon speaks, reality listens.',
  'The second Simon is not a clone — it is his echo across dimensions.',
];
let loreCooldown=0;

// Extended attack executor — handles all 187 attack types
function doSimonExtendedAttack(attackNum){
  const sx=simonX,sy2=simonY+50;
  sAnim.castAnim=15;sAnim.bodyGlow=0.8;
  setTimeout(()=>{sAnim.bodyGlow=0;},250);
  shakeT=Math.max(shakeT,5);

  // Show lore occasionally
  loreCooldown--;
  if(loreCooldown<=0&&Math.random()<0.15){
    addFT(W/2,H*0.12,SIMON_LORE[rndI(0,SIMON_LORE.length-1)],'#ffcc88',true);
    loreCooldown=20;
  }

  // Determine category
  let cat,localIdx;
  const cats=Object.entries(SIMON_ATTACK_CATEGORIES);
  let cumulative=0;
  for(const [name,count] of cats){
    if(attackNum<cumulative+count){cat=name;localIdx=attackNum-cumulative;break;}
    cumulative+=count;
  }
  if(!cat){cat='lightning';localIdx=attackNum%30;}

  // Animate arms based on category
  if(cat==='lightning'||cat==='fire'||cat==='divine'){sAnim.targetArmL=rnd(-1.3,-0.5);sAnim.targetArmR=rnd(-1.3,-0.5);}
  else if(cat==='throwing'||cat==='melee'){sAnim.targetArmR=rnd(-1.5,-0.8);sAnim.targetArmL=rnd(0.2,0.6);}
  else if(cat==='teleport'||cat==='dimensional'){sAnim.targetArmL=rnd(-0.3,0.3);sAnim.targetArmR=rnd(-0.3,0.3);}
  else if(cat==='aura'){sAnim.targetArmL=-1.2;sAnim.targetArmR=-1.2;}
  sAnim.targetHead=rnd(-0.08,0.08);

  switch(cat){
    case 'lightning': doLightningAttack(localIdx,sx,sy2); break;
    case 'throwing': doThrowingAttack(localIdx,sx,sy2); break;
    case 'melee': doMeleeAttack(localIdx,sx,sy2); break;
    case 'teleport': doTeleportAttack(localIdx,sx,sy2); break;
    case 'fire': doFireAttack(localIdx,sx,sy2); break;
    case 'divine': doDivineAttack(localIdx,sx,sy2); break;
    case 'transform': doTransformAttack(localIdx,sx,sy2); break;
    case 'dimensional': doDimensionalAttack(localIdx,sx,sy2); break;
    case 'aura': doAuraAttack(localIdx,sx,sy2); break;
  }
}

// ─── THROWING ATTACKS (30) — Simon hurls enemies, bosses, UFOs ───
function doThrowingAttack(idx,sx,sy){
  sfxBossRoar();
  const types=['normal','fast','tank','shooter','zigzag'];
  if(idx<10){
    // Throw 1-3 regular enemies at base
    const count=1+Math.floor(idx/3);
    for(let i=0;i<count;i++){
      const t=types[idx%5];
      spawnEnemy(sx+rnd(-30,30),sy+rnd(-20,20),rndI(0,2),t);
    }
    addFT(sx,sy-30,'THROW!','#ff8844');
  } else if(idx<18){
    // Throw meteors
    for(let i=0;i<2+Math.floor(idx/6);i++)spawnMeteor(sx+rnd(-40,40),sy);
    addFT(sx,sy-30,'METEOR THROW!','#aa7755');
  } else if(idx<24){
    // Throw UFOs
    spawnUFO();
    addFT(sx,sy-30,'UFO THROW!','#88ff88');
  } else if(idx<27){
    // Throw cosmic boss fragments
    for(let i=0;i<3;i++){
      const a=rnd(0,Math.PI*2);
      eBullets.push({x:sx,y:sy,vx:Math.cos(a)*4,vy:Math.sin(a)*4,size:8,color:['#aaccff','#ffaa00','#44aa22','#aa44ff'][rndI(0,3)]});
    }
    spawnEnemy(sx+rnd(-30,30),sy,rndI(1,3));
    addFT(sx,sy-30,'BOSS FRAGMENT!','#ff4444');
  } else {
    // Throw everything at once
    spawnEnemy(sx-40,sy,rndI(0,2));spawnEnemy(sx+40,sy,rndI(0,2));
    spawnMeteor(sx,sy-20);if(ufos.length<3)spawnUFO();
    for(let i=0;i<5;i++)eBullets.push({x:sx+rnd(-20,20),y:sy,vx:rnd(-3,3),vy:rnd(1,4),size:5,color:'#ff4444'});
    addFT(sx,sy-40,'EVERYTHING!','#ff0000',true);shakeT=12;
  }
}

// ─── MELEE/RANGE WEAPON ATTACKS (30) ───
function doMeleeAttack(idx,sx,sy){
  sfxHit();
  if(idx<8){
    // Trident thrust — line of damage toward base
    const a=ang(sx,sy,BX,BY);
    for(let i=0;i<6;i++){
      const d=40+i*30;
      eBullets.push({x:sx+Math.cos(a)*d,y:sy+Math.sin(a)*d,vx:Math.cos(a)*3,vy:Math.sin(a)*3,size:6,color:'#ffcc00'});
    }
    addFT(sx,sy-30,'TRIDENT!','#ffcc00');
  } else if(idx<15){
    // Sword slash — arc of bullets
    const a=ang(sx,sy,BX,BY);
    for(let i=-4;i<=4;i++){
      const sa=a+i*0.15;
      eBullets.push({x:sx,y:sy,vx:Math.cos(sa)*5,vy:Math.sin(sa)*5,size:5,color:'#ffaa44'});
    }
    addFT(sx,sy-30,'SLASH!','#ffaa44');

    shakeT=10;addFT(BX,BY-40,'SMASH!','#ffcc00');

    // Spear rain from above
    for(let i=0;i<8+idx-22;i++){

      eBullets.push({x:rx,y:-10,vx:0,vy:4+Math.random()*2,size:4,color:'#ffdd44'});

}

// ─── TELEPORT/PORTAL ATTACKS (10) ───
function doTeleportAttack(idx,sx,sy){
  sfxTeleport();

    bossFX.push({type:'shockwave',x:BX+rnd(-60,60),y:rnd(60,H*0.4),radius:0,maxRadius:60,life:30,color:'#ffcc00'});

function destroyNBlocks(n){
  const alive=aliveBlocks();
  for(let i=0;i<Math.min(n,alive.length);i++){
    const b=alive[rndI(0,alive.length-1)];
    destroyBlk(b);
    alive.splice(alive.indexOf(b),1);
  }
}

function genBolt(x1,y1,x2,y2,life){
  const segs=[];const steps=Math.max(6,Math.floor(dst(x1,y1,x2,y2)/20));
  let px=x1,py=y1;
  for(let i=1;i<=steps;i++){
    const t=i/steps;const jit=(1-Math.abs(t-0.5)*2);
    const nx=x1+(x2-x1)*t+rnd(-25,25)*jit;
    const ny=y1+(y2-y1)*t+rnd(-10,10);
    segs.push({x1:px,y1:py,x2:nx,y2:ny});
    if(Math.random()<0.3&&i>1&&i<steps-1){
      segs.push({x1:nx,y1:ny,x2:nx+rnd(-40,40),y2:ny+rnd(10,40),branch:true});
    }
    px=nx;py=ny;
  }
  return{segments:segs,life};
}

function generateLightning(x1,y1,x2,y2){return genBolt(x1,y1,x2,y2,60);}

// ═════════════════════════════════════════
// DRAW SIMON — perfectly proportioned figure
// ═════════════════════════════════════════
function drawSimon(){
  if(!simonActive)return;
  const sx=simonX,sy=simonY+sAnim.hover;

  // Progressive darkness + storm clouds (inspired by Level UP video at 6:32)
  if(simonPhase>=2){
    const dk=simonPhase<=2?Math.min(0.4,simonTimer*0.0004):simonPhase<=4?0.5:0.65;
    X.fillStyle=`rgba(0,0,0,${dk})`;X.fillRect(0,0,W,H);

    // Storm clouds — dark swirling masses across the top half of screen
    if(simonPhase>=3){
      const cloudIntensity=simonPhase>=5?0.35:simonPhase>=4?0.25:0.15;
      for(let i=0;i<6;i++){
        const cx=W*0.1+i*(W*0.15)+Math.sin(frameN*0.008+i*1.7)*40;
        const cy=60+Math.sin(frameN*0.01+i*2.3)*30+i*15;
        const cr=80+Math.sin(frameN*0.006+i)*25;
        const cgrad=X.createRadialGradient(cx,cy,cr*0.2,cx,cy,cr);
        cgrad.addColorStop(0,`rgba(40,35,50,${cloudIntensity})`);
        cgrad.addColorStop(0.5,`rgba(30,28,40,${cloudIntensity*0.6})`);
        cgrad.addColorStop(1,'rgba(20,18,30,0)');
        X.fillStyle=cgrad;X.beginPath();X.arc(cx,cy,cr,0,Math.PI*2);X.fill();
      }
      // Cloud lightning flickers in background
      if(simonPhase>=4&&Math.random()<0.06){
        const fx=rnd(50,W-50),fy=rnd(20,120);
        X.fillStyle=`rgba(200,180,255,${rnd(0.05,0.15)})`;
        X.fillRect(fx-40,fy-2,80,4);
        X.fillRect(fx-2,fy-30,4,60);
      }
    }

    // Phase 5: total dark storm — almost black except for the bolt
    if(simonPhase===5&&simonTimer>=1&&simonTimer<20){
      X.fillStyle=`rgba(0,0,0,${0.7-simonTimer*0.03})`;X.fillRect(0,0,W,H);
    }
    // Phase 5 aftermath: brief total darkness (like the video)
    if(simonPhase===5&&simonTimer>=60&&simonTimer<75){
      const blackout=Math.min(1,(simonTimer-60)/5);
      X.fillStyle=`rgba(0,0,0,${blackout*0.9})`;X.fillRect(0,0,W,H);
    }
  }

  // Draw active lightning bolts
  for(const bolt of simonBolts)drawBolt(bolt);

  // The final bolt
  if(lightning)drawBolt(lightning);

  X.globalAlpha=simonAlpha;
  X.save();X.translate(sx,sy);

  // ─── PORTAL (phase 1 only) ───
  if(simonPhase===1&&simonTimer<80){
    const portalR=Math.min(50,simonTimer*1.2);
    const portalAlpha=simonTimer<60?simonTimer/60:1-(simonTimer-60)/20;
    X.globalAlpha=Math.max(0,portalAlpha);
    X.save();X.translate(0,0);
    // Swirling portal
    for(let ring=3;ring>=0;ring--){
      const r=portalR-ring*8;if(r<=0)continue;
      const grad=X.createRadialGradient(0,0,r*0.2,0,0,r);
      grad.addColorStop(0,`rgba(255,204,0,${0.3-ring*0.05})`);
      grad.addColorStop(0.5,`rgba(180,100,255,${0.2-ring*0.04})`);
      grad.addColorStop(1,'rgba(0,0,0,0)');
      X.fillStyle=grad;X.beginPath();X.arc(0,0,r,0,Math.PI*2);X.fill();
    }
    // Spinning lines
    X.strokeStyle='rgba(255,204,0,0.4)';X.lineWidth=2;
    for(let i=0;i<6;i++){
      const a=(Math.PI*2/6)*i+frameN*0.08;
      X.beginPath();X.moveTo(Math.cos(a)*portalR*0.3,Math.sin(a)*portalR*0.3);
      X.lineTo(Math.cos(a)*portalR,Math.sin(a)*portalR);X.stroke();
    }
    X.restore();
    X.globalAlpha=simonAlpha;
  }

  // ─── AURA (multi-layer) ───
  for(let i=4;i>=0;i--){
    const r=65+i*14+Math.sin(frameN*0.035+i*0.8)*5;
    const grad=X.createRadialGradient(0,0,3,0,0,r);
    const a=0.08+sAnim.bodyGlow*0.15-i*0.012;
    grad.addColorStop(0,`rgba(255,${190+i*15},0,${Math.max(0,a)})`);
    grad.addColorStop(1,'rgba(255,170,0,0)');
    X.fillStyle=grad;X.beginPath();X.arc(0,0,r,0,Math.PI*2);X.fill();
  }

  // ─── CAPE (animated wave) ───
  X.fillStyle='#150828';X.shadowColor='#5518aa';X.shadowBlur=8;
  X.beginPath();X.moveTo(-22,-14);
  const cw=sAnim.capeWave;

  X.lineTo(-12,52);X.lineTo(0,58+Math.sin(cw+1)*3);X.lineTo(12,52);
  X.lineTo(30+Math.sin(cw+0.3)*5,58);
  X.quadraticCurveTo(36+Math.sin(cw+0.7)*4,15,22,-14);
  X.closePath();X.fill();
  X.fillStyle='rgba(80,30,140,0.15)';
  X.beginPath();X.moveTo(-16,-8);X.lineTo(-22,48);X.lineTo(22,48);X.lineTo(16,-8);X.closePath();X.fill();
  X.shadowBlur=0;

  // ─── LEGS ───
  X.fillStyle='#1a1a1a';
  X.fillRect(-11,24,9,24);X.fillRect(2,24,9,24);
  // Knee guards
  X.fillStyle='#ccaa00';X.fillRect(-12,32,11,3);X.fillRect(1,32,11,3);
  // Boots
  X.fillStyle='#111';X.fillRect(-13,42,13,7);X.fillRect(0,42,13,7);
  X.fillStyle='#ccaa00';X.fillRect(-13,42,13,2);X.fillRect(0,42,13,2);
  X.fillRect(-14,47,15,2);X.fillRect(-1,47,15,2);

  // ─── TORSO ───
  X.fillStyle='#161616';X.shadowColor='#ffcc00';X.shadowBlur=2+sAnim.bodyGlow*12;
  // Main body
  X.beginPath();X.moveTo(-15,-18);X.lineTo(-17,-5);X.lineTo(-15,26);X.lineTo(15,26);X.lineTo(17,-5);X.lineTo(15,-18);X.closePath();X.fill();
  X.shadowBlur=0;
  // Armor detail lines
  X.strokeStyle='#ccaa00';X.lineWidth=1;
  X.strokeRect(-15,-18,30,44);
  X.beginPath();X.moveTo(-15,-6);X.lineTo(15,-6);X.stroke();
  X.beginPath();X.moveTo(-15,8);X.lineTo(15,8);X.stroke();
  X.beginPath();X.moveTo(0,-18);X.lineTo(0,26);X.stroke();
  // Belt
  X.fillStyle='#ccaa00';X.fillRect(-16,22,32,3);
  // Belt buckle
  X.fillStyle='#ffdd00';X.fillRect(-4,21,8,5);X.fillStyle='#aa8800';X.fillRect(-2,22,4,3);

  // ─── LIGHTNING EMBLEM ───
  X.fillStyle='#ffcc00';X.shadowColor='#ffcc00';X.shadowBlur=4+sAnim.bodyGlow*8;
  X.beginPath();X.moveTo(-1,-15);X.lineTo(4,-15);X.lineTo(1,-7);X.lineTo(5,-7);X.lineTo(-1,3);X.lineTo(1,-3);X.lineTo(-3,-3);X.closePath();X.fill();
  X.shadowBlur=0;

  // ─── PAULDRONS ───
  X.fillStyle='#1a1a1a';
  X.beginPath();X.arc(-19,-16,11,Math.PI,0);X.fill();

function drawBolt(bolt){
  const a=Math.min(1,bolt.life/15);
  // Outer glow
  X.globalAlpha=a*0.5;X.strokeStyle='#ffaa00';X.lineWidth=10;X.shadowColor='#ffcc00';X.shadowBlur=25;
  for(const s of bolt.segments){if(s.branch)continue;X.beginPath();X.moveTo(s.x1,s.y1);X.lineTo(s.x2,s.y2);X.stroke();}
  // Main
  X.globalAlpha=a;
  for(const s of bolt.segments){X.lineWidth=s.branch?1.5:3+Math.random()*1.5;X.strokeStyle=s.branch?'#ffcc44':'#ffffff';X.beginPath();X.moveTo(s.x1,s.y1);X.lineTo(s.x2,s.y2);X.stroke();}
  // Core
  X.strokeStyle='#ffffcc';X.lineWidth=1.5;
  for(const s of bolt.segments){if(s.branch)continue;X.beginPath();X.moveTo(s.x1,s.y1);X.lineTo(s.x2,s.y2);X.stroke();}
  X.shadowBlur=0;X.globalAlpha=1;
}

// ─── FRIENDLY UFO UPDATE ───
function updateFriendlyUFOs(){
  for(let i=friendlyUFOs.length-1;i>=0;i--){
    const f=friendlyUFOs[i];f.life--;
    if(f.life<=0){friendlyUFOs.splice(i,1);continue;}
    // Move toward target
    const a=ang(f.x,f.y,f.targetX,f.targetY);
    f.x+=Math.cos(a)*2;f.y+=Math.sin(a)*2;
    if(dst(f.x,f.y,f.targetX,f.targetY)<20){f.targetX=rnd(60,W-60);f.targetY=rnd(40,H*0.5);}
    // Shoot at nearest enemy
    f.shootCD--;
    if(f.shootCD<=0){
      f.shootCD=15;
      let nearest=null,nd=Infinity;
      for(const e of enemies){const d=dst(f.x,f.y,e.x,e.y);if(d<nd){nd=d;nearest=e;}}
      for(const m of meteors){const d=dst(f.x,f.y,m.x,m.y);if(d<nd){nd=d;nearest=m;}}
      if(nearest){
        const sa=ang(f.x,f.y,nearest.x,nearest.y);
        bullets.push({x:f.x,y:f.y,vx:Math.cos(sa)*8,vy:Math.sin(sa)*8,damage:bDmg*0.7,pierce:0,size:4});
      }
    }
  }
}

// ─── SHOOTING ───
function shoot(){
  const ty=BY-(BROWS*BS)/2-4;
  const a=ang(BX,ty,mouseX,mouseY);
  sfxShoot();
  for(let i=0;i<multi;i++){
    const sp=multi>1?(i-(multi-1)/2)*0.12:0;
    const ba=a+sp;
    const cu=CANNON_UPGRADES[cannonLevel-1];
    bullets.push({x:BX,y:ty,vx:Math.cos(ba)*bSpd,vy:Math.sin(ba)*bSpd,damage:bDmg*cu.dmgMul,pierce:bPierce,size:4+bDmg*0.8});
  }
}

function useBomb(){
  if(state!=='playing'||bombCD>0)return;
  // Infinite bombs while a bomb-only boss is alive
  const hasBombBoss=enemies.some(e=>e.bombOnly);
  if(!hasBombBoss&&bombN<=0)return;
  if(!hasBombBoss)bombN--;
  bombCD=hasBombBoss?15:30; // faster bombs during bomb bossshakeT=12;sfxBomb();flash('#ffff00',0.4);
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];const dmg=8;
    if(e.bulletOnly){spawnP(e.x,e.y,'#44aaff',3,2);continue;} // bombs bounce off bullet-only boss
    if(e.shieldHP>0)e.shieldHP=Math.max(0,e.shieldHP-dmg);else e.hp-=dmg;
    e.flash=8;spawnP(e.x,e.y,'#fff',6,4);
    if(e.hp<=0)killEnemy(i);
  }
  // Damage meteors, UFOs, aliens
  for(let i=meteors.length-1;i>=0;i--){meteors[i].hp-=5;meteors[i].flash=6;if(meteors[i].hp<=0){score+=meteors[i].points;spawnP(meteors[i].x,meteors[i].y,meteors[i].color,6,4);meteors.splice(i,1);}}
  for(let i=ufos.length-1;i>=0;i--){ufos[i].hp-=8;ufos[i].flash=6;if(ufos[i].hp<=0){score+=100;spawnP(ufos[i].x,ufos[i].y,'#88ff88',10,5);ufos.splice(i,1);}}
  for(let i=aliens.length-1;i>=0;i--){aliens[i].hp-=3;aliens[i].flash=5;if(aliens[i].hp<=0){score+=aliens[i].points;spawnP(aliens[i].x,aliens[i].y,aliens[i].color,5,3);aliens.splice(i,1);}}
  // Damage orb too
  if(orbMode&&orb){orb.hp-=8;orb.flash=8;if(orb.hp<=0)startOrbDeath();}
  spawnP(BX,BY,'#fff',40,14);addFT(BX,BY-100,'BOMB!','#ff0',true);
}

// ─── KILL ENEMY ───
function killEnemy(i){
  const e=enemies[i];score+=e.points;
  spawnP(e.x,e.y,e.isGlitch?'#ff00ff':'#e94560',12+e.tier*4,3+e.tier*2);
  addFT(e.x,e.y-10,`+${e.points}`,'#ff0');sfxKill();

  // Glitch Overlord death -> orb sequence
  if(e.isGlitch&&!e.isClone&&!e.isUnderlord&&e.tier===6){
    enemies.splice(i,1);
    // Remove all clones
    for(let j=enemies.length-1;j>=0;j--)if(enemies[j].isClone)enemies.splice(j,1);
    glitchBoss=null;glitchClones=[];
    startOrbSequence(e.x,e.y);
    return;
  }

  // Normal split (non-glitch, non-clone)
  if(!e.isGlitch&&e.tier>0){
    for(let j=0;j<2;j++){
      const ox=(j===0?-1:1)*(e.size*0.35);
      spawnEnemy(e.x+ox,e.y+rnd(-5,5),e.tier-1,e.type==='tank'?'tank':undefined);
    }
  }
  if(Math.random()<0.1+e.tier*0.06)spawnPowerup(e.x,e.y);
  // Chain lightning: damage nearby enemies on kill
  if(chainLightningActive){
    const cx=e.x,cy=e.y;
    for(let k=enemies.length-1;k>=0;k--){if(k===i)continue;const ne=enemies[k];
    if(dst(cx,cy,ne.x,ne.y)<120){ne.hp-=8;ne.flash=6;spawnP(ne.x,ne.y,'#44ddff',4,3);
    if(ne.hp<=0)killEnemy(k);}}
  }
  // Super gold multiplier
  if(superGoldActive){spawnCoin(e.x+rnd(-15,15),e.y+rnd(-15,15),Math.max(5,Math.floor(e.points/5)));spawnCoin(e.x+rnd(-15,15),e.y+rnd(-15,15),Math.max(5,Math.floor(e.points/5)));}
  // Drop Spaze-Money coins
  const coinChance=0.3+e.tier*0.05;
  if(Math.random()<coinChance)spawnCoin(e.x+rnd(-10,10),e.y+rnd(-10,10),Math.max(1,Math.floor(e.points/20)));
  enemies.splice(i,1);
  // Secret wave 11 unlock: beat wave 10 with >60 blocks alive
  // Wave 11 always unlocks after wave 10
}
