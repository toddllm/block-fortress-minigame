// ─── UPDATE ───
let frameN=0;
function update(){
  if(state!=='playing')return;
  frameN++;

  // Orb mode
  if(orbMode){updateOrb();
    // Player shooting works smoothly during orb mode
    if(shootCD>0)shootCD--;if(bombCD>0)bombCD--;
    if(mouseDown&&shootCD<=0){shoot();shootCD=shootRate;}
    // Update player bullets — move them and check orb hits inside updateOrb
    for(let i=bullets.length-1;i>=0;i--){
      const b=bullets[i];b.x+=b.vx;b.y+=b.vy;
      if(b.x<-20||b.x>W+20||b.y<-20||b.y>H+20){bullets.splice(i,1);continue;}
      // Bullet-powerup collection still works
      for(let j=powerups.length-1;j>=0;j--){
        const p=powerups[j];
        if(dst(b.x,b.y,p.x,p.y)<p.size+b.size){
          p.type.apply();addFT(p.x,p.y-20,p.type.name,p.type.color);spawnP(p.x,p.y,p.type.color,10,4);sfxPowerup();powerups.splice(j,1);break;}
      }
    }
    // Update enemy bullets
    for(let i=eBullets.length-1;i>=0;i--){
      const b=eBullets[i];
      if(b.homing){const a=ang(b.x,b.y,BX,BY);b.vx+=(Math.cos(a)*b.homeSpd);b.vy+=(Math.sin(a)*b.homeSpd);const s=Math.hypot(b.vx,b.vy);if(s>4){b.vx=b.vx/s*4;b.vy=b.vy/s*4;}b.life--;if(b.life<=0){eBullets.splice(i,1);continue;}}
      b.x+=b.vx;b.y+=b.vy;
      if(b.x<-20||b.x>W+20||b.y<-20||b.y>H+20){eBullets.splice(i,1);continue;}
      const{block,dist:d}=closestBlk(b.x,b.y);
      if(block&&d<BS+b.size){destroyBlk(block);spawnP(b.x,b.y,'#f44',3,2);eBullets.splice(i,1);}
    }
    // Powerups still fall
    for(let i=powerups.length-1;i>=0;i--){
      const p=powerups[i];p.vy=Math.min(p.vy+0.04,1.2);p.y+=p.vy;p.bobT+=0.08;p.life--;
      if(p.life<=0||p.y>H+20){powerups.splice(i,1);continue;}
      const{block:blk,dist:bd}=closestBlk(p.x,p.y);
      if(blk&&bd<BS+p.size){p.type.apply();addFT(p.x,p.y-20,p.type.name,p.type.color);spawnP(p.x,p.y,p.type.color,10,4);sfxPowerup();powerups.splice(i,1);}
    }
    updatePFX();
    aliveN=baseBlocks.filter(b=>b.alive).length;
    // Auto-repair blocks during orb fight so player can survive to see Simon
    if(orbMode&&!orbDeathAnim&&frameN%30===0&&aliveN<BCOLS*BROWS){
      repairBase(3);
    }
    if(aliveN<=0){if(phoenixReady){phoenixReady=false;for(const b of baseBlocks)b.alive=true;aliveN=baseBlocks.length;flash('#ff6600',0.8);shakeT=15;addFT(BX,BY-60,'PHOENIX REVIVE!','#ff6600',true);sfxPowerup();}else{state='dead';shakeT=20;stopMusic();startCamFloat();if(score>highScore){highScore=score;localStorage.setItem('bfH3',highScore);}showDeath();}}
    if(screenFlash.alpha>0)screenFlash.alpha=Math.max(0,screenFlash.alpha-screenFlash.decay);
    if(shakeT>0)shakeT--;
    return;
  }

  // Simon sequence runs independently
  if(simonActive){
    updateSimon();
    // Simon reflects player bullets back at base
    if(simonPhase>=3){
      const sy2=simonY+sAnim.hover;
      for(let i=bullets.length-1;i>=0;i--){
        const b=bullets[i];
        if(dst(b.x,b.y,simonX,sy2)<60){
          // Reflect: turn into enemy bullet aimed at base
          eBullets.push({x:b.x,y:b.y,vx:-b.vx*0.8,vy:-b.vy*0.8+1,size:b.size,color:'#ffcc00'});
          spawnP(b.x,b.y,'#ffcc00',4,3);
          bullets.splice(i,1);
        }
      }
    }
    // Friendly UFOs still work during Simon
    updateFriendlyUFOs();
    if(micCooldown>0)micCooldown--;
    if(checkMic())spawnFriendlyUFO();
    return;
  }

  if(shootCD>0)shootCD--;if(bombCD>0)bombCD--;
  if(mouseDown&&shootCD<=0){shoot();shootCD=shootRate;}

  // Wave
  if(waveTimer>0)waveTimer--;
  else if(waveELeft>0){if(frameN%Math.max(8,35-wave*2)===0)spawnWaveEnemy();}
  else if(enemies.length===0&&waveELeft<=0&&!orbMode&&!simonActive&&!simonPending&&!mercyUsed)nextWave();

  // Bullets
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];b.x+=b.vx;b.y+=b.vy;
    if(b.x<-20||b.x>W+20||b.y<-20||b.y>H+20){bullets.splice(i,1);continue;}
    let hit=false;
    for(let j=enemies.length-1;j>=0;j--){
      const e=enemies[j];
      if(dst(b.x,b.y,e.x,e.y)<e.size/2+b.size/2){
        // Bomb-only boss: bullets bounce off
        if(e.bombOnly){spawnP(b.x,b.y,'#ff8800',3,2);addFT(b.x,b.y-10,'BOMB ONLY!','#ff8800');hit=true;break;}
        if(e.shieldHP>0){e.shieldHP-=b.damage;if(e.shieldHP<0){e.hp+=e.shieldHP;e.shieldHP=0;}spawnP(b.x,b.y,'#88ccff',3,2);}
        else e.hp-=b.damage;
        e.flash=6;spawnP(b.x,b.y,'#6f6',3,3);sfxHit();
        // Chain lightning: chain damage to nearby enemies
        if(chainLightningActive){for(let k=enemies.length-1;k>=0;k--){if(k===j)continue;const ne=enemies[k];if(dst(b.x,b.y,ne.x,ne.y)<100){ne.hp-=b.damage*0.4;ne.flash=4;spawnP(ne.x,ne.y,'#44ddff',3,2);if(ne.hp<=0)killEnemy(k);}}}
        if(e.hp<=0)killEnemy(j);
        if(b.pierce>0){b.pierce--;b.damage*=0.8;}else hit=true;
        break;
      }
    }
    // Bullets collect powerups
    if(!hit){for(let j=powerups.length-1;j>=0;j--){
      const p=powerups[j];
      if(dst(b.x,b.y,p.x,p.y)<p.size+b.size){
        p.type.apply();addFT(p.x,p.y-20,p.type.name,p.type.color);spawnP(p.x,p.y,p.type.color,10,4);sfxPowerup();powerups.splice(j,1);break;}
    }}
    if(hit)bullets.splice(i,1);
  }

  // Enemy bullets
  for(let i=eBullets.length-1;i>=0;i--){
    const b=eBullets[i];
    if(b.homing){const a=ang(b.x,b.y,BX,BY);b.vx+=Math.cos(a)*b.homeSpd;b.vy+=Math.sin(a)*b.homeSpd;const s=Math.hypot(b.vx,b.vy);if(s>4){b.vx=b.vx/s*4;b.vy=b.vy/s*4;}b.life--;if(b.life<=0){eBullets.splice(i,1);continue;}}
    b.x+=b.vx;b.y+=b.vy;
    if(b.x<-20||b.x>W+20||b.y<-20||b.y>H+20){eBullets.splice(i,1);continue;}
    const{block,dist:d}=closestBlk(b.x,b.y);
    if(block&&d<BS+b.size){destroyBlk(block);spawnP(b.x,b.y,'#f44',3,2);eBullets.splice(i,1);}
  }

  // Enemies
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    if(e.flash>0)e.flash--;

    // Glitch overlord update
    if(e.isGlitch&&!e.isClone&&!e.isUnderlord&&e.tier===6)updateGlitchBoss(e,i);
    if(e.isUnderlord)updateUnderlord(e);
    // Cosmic boss update
    if(e.type==='cosmic')updateCosmicBoss(e);

    // Movement
    const a=ang(e.x,e.y,BX,BY);
    let mx=Math.cos(a)*e.speed,my=Math.sin(a)*e.speed;
    if(e.type==='zigzag'){e.zigTimer++;if(e.zigTimer%40===0)e.zigDir*=-1;const pa=a+Math.PI/2;mx+=Math.cos(pa)*e.speed*1.5*e.zigDir;my+=Math.sin(pa)*e.speed*1.5*e.zigDir;}
    if(e.tier>=5&&!e.isGlitch&&e.hp<e.maxHP*0.3&&!e.enraged){e.enraged=true;e.speed*=1.5;addFT(e.x,e.y-e.size/2-30,'ENRAGED!','#ff0000',true);}
    e.x+=mx;e.y+=my;

    // Shooter type
    if(e.type==='shooter'&&!e.isGlitch){e.shootTimer--;if(e.shootTimer<=0){e.shootTimer=80+rndI(0,50);const sa=ang(e.x,e.y,BX,BY);eBullets.push({x:e.x,y:e.y,vx:Math.cos(sa)*3,vy:Math.sin(sa)*3,size:4,color:'#ff4444'});}}

    // Clones shoot too
    if(e.isClone){e.minorCD1--;if(e.minorCD1<=0){e.minorCD1=50;const ca=ang(e.x,e.y,BX,BY)+rnd(-0.3,0.3);eBullets.push({x:e.x,y:e.y,vx:Math.cos(ca)*3,vy:Math.sin(ca)*3,size:4,color:'#ff44ff'});}}

    // Tier 4+ normal boss abilities
    if(e.tier>=4&&!e.isGlitch){
      e.ab1--;if(e.ab1<=0){e.ab1=150;const cn=e.tier>=5?16:10;for(let k=0;k<cn;k++){const ba=(Math.PI*2/cn)*k;eBullets.push({x:e.x,y:e.y,vx:Math.cos(ba)*2.5,vy:Math.sin(ba)*2.5,size:5,color:'#ff4444'});}}
      e.ab2--;if(e.ab2<=0){e.ab2=250;if(dst(e.x,e.y,BX,BY)<300){bossFX.push({type:'shockwave',x:e.x,y:e.y,radius:0,maxRadius:e.tier>=5?180:120,life:30,color:'#ff6644'});for(const bl of aliveBlocks())if(dst(e.x,e.y,bl.x,bl.y)<(e.tier>=5?180:120)&&Math.random()<0.3)destroyBlk(bl);shakeT=10;}}
      if(e.shieldHP<=0&&e.shieldCD<=0){e.shieldHP=e.maxShieldHP;e.shieldCD=500;}
      if(e.shieldCD>0)e.shieldCD--;
      if(e.tier>=5){e.ab3--;if(e.ab3<=0){e.ab3=300;const la=ang(e.x,e.y,BX,BY);bossFX.push({type:'laser',x:e.x,y:e.y,angle:la,life:45,width:6,maxWidth:20,color:'#ff0000'});for(let t=0;t<500;t+=8){const lx=e.x+Math.cos(la)*t,ly=e.y+Math.sin(la)*t;if(lx<-10||lx>W+10||ly<-10||ly>H+10)break;for(const bl of aliveBlocks())if(dst(lx,ly,bl.x,bl.y)<12&&Math.random()<0.5)destroyBlk(bl);}shakeT=15;sfxLaser();}
        e.summonT--;if(e.summonT<=0){e.summonT=500;for(let k=0;k<3;k++){const oa=rnd(0,Math.PI*2);spawnEnemy(e.x+Math.cos(oa)*60,e.y+Math.sin(oa)*60,0);}}
      }
    }

    // Hit base
    const{block:blk,dist:bd}=closestBlk(e.x,e.y);
    if(blk&&bd<e.size/2+BS){
      const dc=1+e.tier*2;const alive=aliveBlocks().sort((a2,b2)=>dst(e.x,e.y,a2.x,a2.y)-dst(e.x,e.y,b2.x,b2.y));
      for(let d=0;d<Math.min(dc,alive.length);d++)destroyBlk(alive[d]);
      shakeT=5+e.tier*2;
      if(e.tier<=1&&!e.isGlitch){spawnP(e.x,e.y,'#e94560',8,4);enemies.splice(i,1);score+=e.points;}
      else{e.x-=mx*15;e.y-=my*15;e.hp-=2;if(e.hp<=0)killEnemy(i);}
    }
  }

  // Boss FX
  for(let i=bossFX.length-1;i>=0;i--){const f=bossFX[i];f.life--;if(f.type==='shockwave')f.radius+=f.maxRadius/30;if(f.type==='laser'||f.type==='glitchBeam')f.width=f.maxWidth*(f.life/45);if(f.life<=0)bossFX.splice(i,1);}

  // Meteors
  for(let i=meteors.length-1;i>=0;i--){
    const m=meteors[i];m.x+=m.vx;m.y+=m.vy;m.rot+=m.rotSpd;
    if(m.flash>0)m.flash--;
    if(m.y>H+60||m.x<-60||m.x>W+60){meteors.splice(i,1);continue;}
    // Hit base blocks
    const{block:blk,dist:bd}=closestBlk(m.x,m.y);
    if(blk&&bd<m.size/2+BS){
      const dc=1+m.tier;const alive=aliveBlocks().sort((a2,b2)=>dst(m.x,m.y,a2.x,a2.y)-dst(m.x,m.y,b2.x,b2.y));
      for(let d=0;d<Math.min(dc,alive.length);d++)destroyBlk(alive[d]);
      spawnP(m.x,m.y,m.color,8,5);shakeT=3+m.tier*2;sfxHit();
      meteors.splice(i,1);continue;
    }
    // Bullet hits
    for(let j=bullets.length-1;j>=0;j--){
      const b=bullets[j];
      if(dst(b.x,b.y,m.x,m.y)<m.size/2+b.size){
        m.hp-=b.damage;m.flash=5;spawnP(b.x,b.y,'#aa8866',3,2);sfxHit();
        if(m.hp<=0){
          // Giant meteor phases: reset HP, shrink, next phase
          if(m.isGiant&&m.phase<m.maxPhase){
            m.phase++;m.hp=10;m.maxHP=10;m.size*=0.8;m.speed*=1.15;
            spawnP(m.x,m.y,'#ff8844',10,6);addFT(m.x,m.y-20,`PHASE ${m.phase}/${m.maxPhase}`,'#ff8844');
            shakeT=6;sfxHit();
            // Shed some small meteors each phase
            for(let k=0;k<2;k++)spawnMeteor(m.x+rnd(-20,20),m.y+rnd(-15,15));
            if(b.pierce>0){b.pierce--;b.damage*=0.8;}else bullets.splice(j,1);
            break;
          }
          score+=m.points;spawnP(m.x,m.y,m.color,8+m.tier*4,4+m.tier);addFT(m.x,m.y-10,`+${m.points}`,'#ff0');sfxKill();
          // Large meteors split into 2 smaller
          if(m.tier>0&&!m.isGiant){for(let k=0;k<2;k++){const nm={...m,x:m.x+rnd(-15,15),y:m.y+rnd(-10,10),tier:m.tier-1,size:[14,28,48][m.tier-1],hp:[2,8,20][m.tier-1],maxHP:[2,8,20][m.tier-1],speed:m.speed*1.2,vx:rnd(-1.5,1.5),vy:rnd(0.5,2),points:[15,50,120][m.tier-1],flash:0,jagged:Array.from({length:8},()=>rnd(0.7,1.3))};meteors.push(nm);}}
          // Giant meteor final death: split into many
          if(m.isGiant){for(let k=0;k<4;k++)spawnMeteor(m.x+rnd(-30,30),m.y+rnd(-20,20));spawnPowerup(m.x,m.y);}
          if(Math.random()<0.08+m.tier*0.05)spawnPowerup(m.x,m.y);
          meteors.splice(i,1);
          if(b.pierce>0){b.pierce--;b.damage*=0.8;}else bullets.splice(j,1);
          break;
        }
        if(b.pierce>0){b.pierce--;b.damage*=0.8;}else{bullets.splice(j,1);break;}
      }
    }
  }
  // UFOs
  for(let i=ufos.length-1;i>=0;i--){
    const u=ufos[i];u.bobT+=0.06;
    u.moveAngle+=rnd(-0.05,0.05);
    u.x+=Math.cos(u.moveAngle)*u.speed;u.y+=Math.sin(u.moveAngle)*u.speed*0.3+0.2;
    u.x=Math.max(30,Math.min(W-30,u.x));u.y=Math.max(20,Math.min(H*0.5,u.y));
    if(u.flash>0)u.flash--;
    u.spawnCD--;
    if(u.spawnCD<=0){u.spawnCD=80+rndI(0,40);spawnEnemy(u.x+rnd(-20,20),u.y+20,0);spawnP(u.x,u.y+15,'#88ff88',4,3);}
    // Bullet hits
    for(let j=bullets.length-1;j>=0;j--){
      const b=bullets[j];
      if(dst(b.x,b.y,u.x,u.y)<u.size+b.size){
        u.hp-=b.damage;u.flash=5;spawnP(b.x,b.y,'#88ff88',3,2);sfxHit();
        if(u.hp<=0){score+=100+wave*10;spawnP(u.x,u.y,'#88ff88',15,6);addFT(u.x,u.y-15,`+${100+wave*10}`,'#ff0');sfxKill();if(Math.random()<0.3)spawnPowerup(u.x,u.y);ufos.splice(i,1);}
        if(b.pierce>0){b.pierce--;b.damage*=0.8;}else{bullets.splice(j,1);}break;
      }
    }
  }
  // Aliens
  for(let i=aliens.length-1;i>=0;i--){
    const a2=aliens[i];
    if(a2.flash>0)a2.flash--;
    a2.vy+=0.12; // gravity
    a2.x+=a2.vx;a2.y+=a2.vy;
    // Ground = base level
    if(a2.y>=BY-a2.size/2){a2.y=BY-a2.size/2;a2.vy=0;a2.onGround=true;}
    // Jump toward base
    if(a2.onGround){a2.jumpCD--;if(a2.jumpCD<=0){a2.jumpCD=40+rndI(0,30);a2.vy=a2.jumpForce;a2.vx=(BX-a2.x)*0.015+rnd(-0.5,0.5);a2.onGround=false;}}
    // Hit base blocks (dangerous ones only)
    if(!a2.harmless){
      const{block:blk,dist:bd}=closestBlk(a2.x,a2.y);
      if(blk&&bd<a2.size/2+BS){destroyBlk(blk);spawnP(a2.x,a2.y,a2.color,4,3);aliens.splice(i,1);continue;}
    }
    // Off screen
    if(a2.x<-40||a2.x>W+40){aliens.splice(i,1);continue;}
    // Bullet hits
    for(let j=bullets.length-1;j>=0;j--){
      const b=bullets[j];
      if(dst(b.x,b.y,a2.x,a2.y)<a2.size/2+b.size){
        a2.hp-=b.damage;a2.flash=4;sfxHit();
        if(a2.hp<=0){score+=a2.points;spawnP(a2.x,a2.y,a2.color,6,3);addFT(a2.x,a2.y-10,a2.harmless?'oops':'+'+ a2.points,a2.harmless?'#888':'#ff0');sfxKill();aliens.splice(i,1);}
        if(b.pierce>0){b.pierce--;b.damage*=0.8;}else{bullets.splice(j,1);}break;
      }
    }
  }
  // Storm
  if(stormActive){
    stormTimer--;
    if(stormTimer<=0){stormActive=false;}
    else{
      // Random lightning strikes on screen
      if(frameN%20===0){
        const sx3=rnd(50,W-50),sy3=rnd(50,H-100);
        simonBolts.push(genBolt(sx3,-10,sx3+rnd(-30,30),sy3,15));
        if(Math.random()<0.3){const{block:blk}=closestBlk(sx3,sy3);if(blk)destroyBlk(blk);}
        if(frameN%60===0)sfxThunder();
      }
      // Spawn random aliens during storm
      if(frameN%45===0)spawnAlien(rnd(0,W),-20);
    }
  }

  // Thief steal logic (inside enemy loop already handles movement, this handles steal)
  for(const e of enemies){
    if(e.isThief&&spazeMoney>0){
      e.stealCD--;
      if(e.stealCD<=0){
        e.stealCD=90;
        const{block:blk,dist:bd}=closestBlk(e.x,e.y);
        if(blk&&bd<e.size+BS+20){
          const stolen=Math.min(spazeMoney,e.stealAmount);
          spazeMoney-=stolen;
          addFT(e.x,e.y-15,`-${stolen}$`,'#ff4444');
          spawnP(e.x,e.y,'#ffdd00',4,3);
        }
      }
    }
  }

  // Spawn coins from kills (in killEnemy, add coin drops)
  // Spawn bomb-only boss occasionally in waves 8+
  if(wave>=8&&frameN%1200===0&&!enemies.some(e=>e.bombOnly)&&Math.random()<0.3)spawnBombBoss(rnd(80,W-80),-50);
  if(wave>=9&&frameN%1400===0&&!enemies.some(e=>e.bulletOnly)&&Math.random()<0.25)spawnBulletBoss(rnd(80,W-80),-50);
  // Giant meteors in waves 10+
  if(wave>=10&&frameN%900===0&&Math.random()<0.2)spawnGiantMeteor(rnd(80,W-80),-60);
  // Spawn thieves in waves 6+
  if(wave>=6&&frameN%600===0&&Math.random()<0.2)spawnThief(rnd(0,W),-20);
  // Insane powerups in waves 12+
  if(wave>=12&&frameN%800===0&&Math.random()<0.2){
    const pu=INSANE_PU[rndI(0,INSANE_PU.length-1)];
    powerups.push({x:rnd(60,W-60),y:-20,type:pu,size:20,life:500,vy:-1,bobT:rnd(0,6)});
  }
  // Super insane power-ups in waves 15+
  if(wave>=15&&frameN%1000===0&&Math.random()<0.15){
    const pu=SUPER_INSANE_PU[rndI(0,SUPER_INSANE_PU.length-1)];
    powerups.push({x:rnd(60,W-60),y:-20,type:pu,size:24,life:400,vy:-1.5,bobT:rnd(0,6)});
  }
  // ULTRA insane power-ups in waves 80+
  if(wave>=80&&frameN%1200===0&&Math.random()<0.12){
    const pu=ULTRA_INSANE_PU[rndI(0,ULTRA_INSANE_PU.length-1)];
    powerups.push({x:rnd(60,W-60),y:-20,type:pu,size:28,life:350,vy:-2,bobT:rnd(0,6),ultra:true});
  }

  // Friendly UFO updates
  updateFriendlyUFOs();
  // Mic check for friendly UFO spawn
  if(micCooldown>0)micCooldown--;
  if(state==='playing'&&checkMic())spawnFriendlyUFO();
  // Auto-upgrade cannon prompt (press U)
  // Coin drops from enemy kills handled in killEnemy

  // Powerups
  for(let i=powerups.length-1;i>=0;i--){
    const p=powerups[i];p.vy=Math.min(p.vy+0.04,1.2);p.y+=p.vy;p.bobT+=0.08;p.life--;
    if(p.life<=0||p.y>H+20){powerups.splice(i,1);continue;}
    const{block:blk,dist:bd}=closestBlk(p.x,p.y);
    if(blk&&bd<BS+p.size){p.type.apply();addFT(p.x,p.y-20,p.type.name,p.type.color);spawnP(p.x,p.y,p.type.color,10,4);sfxPowerup();powerups.splice(i,1);}
  }

  updatePFX();
  if(screenFlash.alpha>0)screenFlash.alpha=Math.max(0,screenFlash.alpha-screenFlash.decay);
  if(shakeT>0)shakeT--;

  aliveN=baseBlocks.filter(b=>b.alive).length;
  if(aliveN<=0){if(phoenixReady){phoenixReady=false;for(const b of baseBlocks)b.alive=true;aliveN=baseBlocks.length;flash('#ff6600',0.8);shakeT=15;addFT(BX,BY-60,'PHOENIX REVIVE!','#ff6600',true);sfxPowerup();}else{state='dead';shakeT=20;stopMusic();spawnP(BX,BY,'#4488ff',60,12);startCamFloat();if(score>highScore){highScore=score;localStorage.setItem('bfH3',highScore);}showDeath();}}
}

function updatePFX(){
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vx*=0.97;p.vy*=0.97;p.life--;if(p.life<=0)particles.splice(i,1);}
  for(let i=floatTexts.length-1;i>=0;i--){const f=floatTexts[i];f.y+=f.vy;f.life--;if(f.life<=0)floatTexts.splice(i,1);}
}

function showDeath(){
  stopMusic();ui.classList.remove('hidden');
  ui.innerHTML=`<h2>BASE DESTROYED</h2><p style="font-size:22px;color:#fff">Score: ${score}</p><p>Survived to Wave ${wave}${wave>117?' (SECRET)':''}</p><p>High Score: ${highScore}</p><p class="start-hint">Click to retry</p>`;
}
function showWin(){
  ui.classList.remove('hidden');
  const secret=wave>117;
  if(secret){
    // This shouldn't show anymore since Simon takes over, but just in case
    ui.innerHTML=`<h1 style="color:#ff88ff">TRUE VICTORY!</h1>
      <p style="font-size:22px;color:#fff">Score: ${score}</p>
      <p>High Score: ${highScore}</p>`;
  } else {
    // Wave 10 win — no retry, game continues to wave 11
    ui.innerHTML=`<h1 style="color:#44ff44">VICTORY!</h1>
      <p style="font-size:22px;color:#fff">Score: ${score}</p>
      <p>All ${TOTAL_WAVES} waves defeated!</p>
      <p>Blocks: ${aliveN}/${BCOLS*BROWS}</p>
      <p>High Score: ${highScore}</p>`;
  }
}

// ═══════════════════════════════════════════════════
//  DRAW
// ═══════════════════════════════════════════════════
function draw(){
  X.save();
  if(shakeT>0)X.translate((Math.random()-.5)*shakeT*0.8,(Math.random()-.5)*shakeT*0.8);

  // BG — planet progression
  const pl=getPlanetForWave(wave);
  X.fillStyle=pl.bg;X.fillRect(0,0,W,H);
  // Draw planet in background (top-right corner, partially off-screen)
  if(state==='playing'){
    const px=W*0.82,py=H*0.18,pr=60;
    X.globalAlpha=0.25;
    X.fillStyle=pl.planet;X.beginPath();X.arc(px,py,pr,0,Math.PI*2);X.fill();
    // Atmosphere glow
    const grd=X.createRadialGradient(px,py,pr*0.8,px,py,pr*1.3);
    const hex=pl.planet;const hr=parseInt(hex.slice(1,3),16),hg=parseInt(hex.slice(3,5),16),hb=parseInt(hex.slice(5,7),16);
    grd.addColorStop(0,'rgba(255,255,255,0)');grd.addColorStop(1,`rgba(${hr},${hg},${hb},0.15)`);
    X.fillStyle=pl.planet;X.globalAlpha=0.08;X.beginPath();X.arc(px,py,pr*1.2,0,Math.PI*2);X.fill();
    // Ring
    if(pl.ring){X.strokeStyle=pl.planet;X.globalAlpha=0.15;X.lineWidth=3;X.beginPath();X.ellipse(px,py,pr*1.6,pr*0.3,0.3,0,Math.PI*2);X.stroke();}
    X.globalAlpha=1;
  }

  // Stars
  for(const s of stars){s.b+=0.01;X.fillStyle=`rgba(255,255,255,${0.3+Math.sin(s.b)*0.2})`;X.fillRect(s.x,s.y,s.s,s.s);}

  // Grid
  X.strokeStyle=glitchBoss||orbMode?'rgba(255,0,255,0.04)':'rgba(34,68,170,0.04)';
  X.lineWidth=1;
  for(let x=0;x<W;x+=30){X.beginPath();X.moveTo(x,0);X.lineTo(x,H);X.stroke();}
  for(let y=0;y<H;y+=30){X.beginPath();X.moveTo(0,y);X.lineTo(W,y);X.stroke();}

  // Glitch BG effect
  if(glitchBoss||orbMode){
    for(let i=0;i<3;i++){
      X.fillStyle=`rgba(255,0,${rndI(100,255)},0.02)`;
      X.fillRect(rnd(0,W),rnd(0,H),rnd(50,200),2);
    }
  }

  // Boss FX
  for(const f of bossFX){
    X.globalAlpha=f.life/(f.type==='shockwave'?30:45);
    if(f.type==='shockwave'){X.strokeStyle=f.color;X.lineWidth=3;X.beginPath();X.arc(f.x,f.y,f.radius,0,Math.PI*2);X.stroke();}
    if(f.type==='laser'||f.type==='glitchBeam'){X.strokeStyle=f.color;X.lineWidth=f.width;X.shadowColor=f.color;X.shadowBlur=15;X.beginPath();X.moveTo(f.x,f.y);X.lineTo(f.x+Math.cos(f.angle)*900,f.y+Math.sin(f.angle)*900);X.stroke();X.shadowBlur=0;}
    X.globalAlpha=1;
  }

  // Aim line
  if(state==='playing'&&aliveN>0){
    const ty=BY-(BROWS*BS)/2;const a=ang(BX,ty,mouseX,mouseY);
    X.strokeStyle='rgba(100,255,100,0.08)';X.lineWidth=1;X.setLineDash([6,6]);
    X.beginPath();X.moveTo(BX,ty);X.lineTo(BX+Math.cos(a)*500,ty+Math.sin(a)*500);X.stroke();X.setLineDash([]);
  }

  // Base
  drawBase();

  // Turret
  if(aliveN>0){
    const ty=BY-(BROWS*BS)/2-4;const a=ang(BX,ty,mouseX,mouseY);
    X.save();X.translate(BX,ty);X.rotate(a);
    const cc=CANNON_UPGRADES[cannonLevel-1].color;X.fillStyle=cc;X.fillRect(0,-3,22,6);X.fillStyle='#fff';X.globalAlpha=0.3;X.fillRect(0,-3,22,2);X.globalAlpha=1;X.fillStyle=cc;X.fillRect(18,-5,8,10);
    X.restore();
  }

  // Bullets
  for(const b of bullets){X.fillStyle='#44ff66';X.shadowColor='#44ff66';X.shadowBlur=6;X.fillRect(b.x-b.size/2,b.y-b.size/2,b.size,b.size);X.shadowBlur=0;}

  // Enemy bullets
  for(const b of eBullets){X.fillStyle=b.color||'#ff4444';X.shadowColor=b.color||'#ff4444';X.shadowBlur=5;X.beginPath();X.arc(b.x,b.y,b.size,0,Math.PI*2);X.fill();X.shadowBlur=0;}

  // Meteors
  for(const m of meteors){
    X.save();X.translate(m.x,m.y);X.rotate(m.rot);
    X.fillStyle=m.flash>0?'#fff':m.color;X.shadowColor=m.color;X.shadowBlur=4;
    X.beginPath();
    for(let i=0;i<8;i++){const a=(Math.PI*2/8)*i;const r=m.size/2*m.jagged[i];
      if(i===0)X.moveTo(Math.cos(a)*r,Math.sin(a)*r);else X.lineTo(Math.cos(a)*r,Math.sin(a)*r);}
    X.closePath();X.fill();X.shadowBlur=0;
    // Craters
    X.fillStyle='rgba(0,0,0,0.2)';
    X.beginPath();X.arc(m.size*0.15,-m.size*0.1,m.size*0.12,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(-m.size*0.2,m.size*0.15,m.size*0.08,0,Math.PI*2);X.fill();
    // HP bar for bigger meteors
    if(m.tier>0&&m.hp<m.maxHP){X.fillStyle='#400';X.fillRect(-m.size/2,-m.size/2-6,m.size,3);X.fillStyle='#f84';X.fillRect(-m.size/2,-m.size/2-6,m.size*(m.hp/m.maxHP),3);}
    X.restore();
  }

  // UFOs
  for(const u of ufos){
    X.save();X.translate(u.x,u.y+Math.sin(u.bobT)*4);
    X.fillStyle=u.flash>0?'#fff':'#88ff88';X.shadowColor='#88ff88';X.shadowBlur=8;
    // Saucer body
    X.beginPath();X.ellipse(0,0,u.size,u.size*0.35,0,0,Math.PI*2);X.fill();
    // Dome
    X.fillStyle=u.flash>0?'#fff':'#aaffaa';
    X.beginPath();X.ellipse(0,-u.size*0.2,u.size*0.5,u.size*0.4,0,Math.PI,0);X.fill();
    // Lights
    for(let i=0;i<5;i++){const a=(Math.PI*2/5)*i+frameN*0.05;X.fillStyle=`hsl(${frameN*3+i*72},80%,60%)`;X.beginPath();X.arc(Math.cos(a)*u.size*0.7,Math.sin(a)*u.size*0.15,2,0,Math.PI*2);X.fill();}
    // Beam below (when spawning)
    if(u.spawnCD<20){X.fillStyle='rgba(136,255,136,0.15)';X.beginPath();X.moveTo(-8,u.size*0.3);X.lineTo(8,u.size*0.3);X.lineTo(15,60);X.lineTo(-15,60);X.fill();}
    X.shadowBlur=0;
    // HP bar
    if(u.hp<u.maxHP){X.fillStyle='#030';X.fillRect(-u.size,-u.size*0.5-8,u.size*2,3);X.fillStyle='#8f8';X.fillRect(-u.size,-u.size*0.5-8,u.size*2*(u.hp/u.maxHP),3);}
    X.fillStyle='#aaffaa';X.font='8px monospace';X.textAlign='center';X.fillText('UFO',0,-u.size*0.5-12);X.textAlign='start';
    X.restore();
  }
  // Aliens
  for(const a2 of aliens){
    X.save();X.translate(a2.x,a2.y);
    const s2=a2.size;
    X.fillStyle=a2.flash>0?'#fff':a2.color;
    X.shadowColor=a2.color;X.shadowBlur=4;
    // Body
    X.fillRect(-s2/2,-s2/2,s2,s2);
    // Eyes
    X.fillStyle='#fff';X.fillRect(-s2*0.3,-s2*0.2,s2*0.2,s2*0.2);X.fillRect(s2*0.1,-s2*0.2,s2*0.2,s2*0.2);
    X.fillStyle='#000';X.fillRect(-s2*0.25,-s2*0.15,s2*0.1,s2*0.1);X.fillRect(s2*0.15,-s2*0.15,s2*0.1,s2*0.1);
    // Antennae for harmless
    if(a2.harmless){X.strokeStyle='#88cc88';X.lineWidth=1;X.beginPath();X.moveTo(-3,-s2/2);X.lineTo(-5,-s2/2-6);X.stroke();X.beginPath();X.moveTo(3,-s2/2);X.lineTo(5,-s2/2-6);X.stroke();}
    // Legs (when jumping)
    if(!a2.onGround){X.fillStyle=a2.color;X.fillRect(-s2/2,s2/2,3,4);X.fillRect(s2/2-3,s2/2,3,4);}
    X.shadowBlur=0;
    X.restore();
  }
  // Storm overlay
  if(stormActive){
    X.fillStyle=`rgba(40,20,60,${0.1+Math.sin(frameN*0.1)*0.05})`;X.fillRect(0,0,W,H);
    // Rain
    X.strokeStyle='rgba(150,180,255,0.15)';X.lineWidth=1;
    for(let i=0;i<15;i++){const rx=rnd(0,W),ry=rnd(0,H);X.beginPath();X.moveTo(rx,ry);X.lineTo(rx-2,ry+12);X.stroke();}
  }

  // Friendly UFOs
  for(const f of friendlyUFOs){
    X.save();X.translate(f.x,f.y);
    X.fillStyle='#44ffaa';X.shadowColor='#44ffaa';X.shadowBlur=10;
    X.beginPath();X.ellipse(0,0,18,7,0,0,Math.PI*2);X.fill();
    X.fillStyle='#88ffcc';X.beginPath();X.ellipse(0,-5,9,8,0,Math.PI,0);X.fill();
    X.fillStyle='#fff';X.font='7px monospace';X.textAlign='center';X.fillText('ALLY',0,-16);
    X.shadowBlur=0;X.textAlign='start';X.restore();
  }

  // Enemies
  for(const e of enemies)drawEnemy(e);

  // Powerups
  for(const p of powerups){
    const bob=Math.sin(p.bobT)*3,al=p.life<60?p.life/60:1;
    const isUltra=p.ultra||p.type.tier==='ultra';
    X.globalAlpha=al;
    if(isUltra){
      // Golden/rainbow pulsing glow for ultra power-ups
      const hue=(frameN*3)%360;
      X.shadowColor=`hsl(${hue},100%,60%)`;X.shadowBlur=18;
      X.strokeStyle='#ffcc00';X.lineWidth=3;
      X.beginPath();X.arc(p.x,p.y+bob,p.size*1.1,0,Math.PI*2);X.stroke();
      X.strokeStyle=`hsl(${hue},100%,70%)`;X.lineWidth=1.5;
      X.beginPath();X.arc(p.x,p.y+bob,p.size*1.3,0,Math.PI*2);X.stroke();
      X.shadowBlur=0;
      // Golden background with rainbow border
      const grd=X.createRadialGradient(p.x,p.y+bob,0,p.x,p.y+bob,p.size);
      grd.addColorStop(0,'#ffee44');grd.addColorStop(0.7,p.type.color);grd.addColorStop(1,'#ffcc00');
      X.fillStyle=grd;X.fillRect(p.x-p.size/2,p.y-p.size/2+bob,p.size,p.size);
      X.strokeStyle='#fff';X.lineWidth=1;X.strokeRect(p.x-p.size/2,p.y-p.size/2+bob,p.size,p.size);
    } else {
      X.strokeStyle=p.type.color;X.lineWidth=1.5;X.shadowColor=p.type.color;X.shadowBlur=8;
      X.beginPath();X.arc(p.x,p.y+bob,p.size*0.9,0,Math.PI*2);X.stroke();X.shadowBlur=0;
      X.fillStyle=p.type.color;X.fillRect(p.x-p.size/2,p.y-p.size/2+bob,p.size,p.size);
    }
    X.fillStyle=isUltra?'#000':'#000';X.font=isUltra?'bold 13px monospace':'bold 11px monospace';X.textAlign='center';X.fillText(p.type.icon,p.x,p.y+4+bob);
    if(isUltra){X.fillStyle='#ffcc00';X.font='bold 7px monospace';X.fillText('ULTRA',p.x,p.y-p.size/2+bob-4);}
    X.globalAlpha=1;
  }

  // Orb
  if(orbMode&&orb)drawOrb();

  // Godmode Simon
  drawSimon();

  // Particles
  for(const p of particles){X.globalAlpha=p.life/45;X.fillStyle=p.color;X.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);}
  X.globalAlpha=1;

  // Orb death pixels
  for(const p of orbPixels){X.globalAlpha=Math.min(1,p.life/60);X.fillStyle=p.color;X.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);}
  X.globalAlpha=1;

  // Float texts
  for(const f of floatTexts){X.globalAlpha=Math.min(1,f.life/30);X.fillStyle=f.color;X.font=f.big?'bold 24px "Segoe UI"':'bold 15px "Segoe UI"';X.textAlign='center';X.fillText(f.text,f.x,f.y);}
  X.globalAlpha=1;X.textAlign='start';

  // HUD
  if(state==='playing')drawHUD();

  // Floating camera in space
  drawCamFloat();

  // Screen flash
  if(screenFlash.alpha>0){X.fillStyle=screenFlash.color;X.globalAlpha=screenFlash.alpha;X.fillRect(0,0,W,H);X.globalAlpha=1;}

  X.restore();
}

function drawBase(){
  const baseW=BCOLS*BS,baseH=BROWS*BS;
  const bsx=BX-baseW/2,bsy=BY-baseH/2;

  // Draw blue blocks first
  X.shadowColor='#4488ff';X.shadowBlur=8;
  for(const b of baseBlocks){
    if(!b.alive)continue;
    const bx=bsx+b.col*BS,by=bsy+b.row*BS;
    const s=b.shade;X.fillStyle=`rgb(${s},${s+40},${s+140+(b.col*5)%40})`;
    X.fillRect(bx,by,BS-1,BS-1);
  }
  X.shadowBlur=0;

  // Overlay camera feed clipped to alive blocks
  if(camReady&&camVideo&&!camFloating){
    X.save();
    // Build clipping path from alive blocks
    X.beginPath();
    for(const b of baseBlocks){
      if(!b.alive)continue;
      const bx=bsx+b.col*BS,by=bsy+b.row*BS;
      X.rect(bx,by,BS-1,BS-1);
    }
    X.clip();
    // Draw camera feed stretched across base area, mirrored
    X.translate(bsx+baseW,bsy);
    X.scale(-1,1);
    X.globalAlpha=0.7;
    X.drawImage(camVideo,0,0,baseW,baseH);
    X.globalAlpha=1;
    X.restore();

    // Subtle blue tint overlay so it blends with base
    X.save();
    X.beginPath();
    for(const b of baseBlocks){
      if(!b.alive)continue;
      const bx=bsx+b.col*BS,by=bsy+b.row*BS;
      X.rect(bx,by,BS-1,BS-1);
    }
    X.clip();
    X.fillStyle='rgba(30,60,180,0.25)';
    X.fillRect(bsx,bsy,baseW,baseH);
    X.restore();
  }
}

// ─── Floating camera in space after base destroyed ───
function startCamFloat(){
  if(!camReady||!camVideo)return;
  camFloating=true;
  // If Simon is active, tumble rapidly like Mario in the Level UP video
  const simonStrike=simonActive&&simonPhase>=5;
  camFloat={x:BX,y:BY,
    vx:simonStrike?rnd(-3,3):rnd(-1.5,1.5),
    vy:simonStrike?rnd(-6,-3):rnd(-2,-0.5),
    rot:0,
    vr:simonStrike?rnd(-0.15,0.15):rnd(-0.02,0.02), // rapid tumble spin
    scale:1,alpha:1,
    tumbling:simonStrike // flag for extra tumble effects
  };
}

function updateCamFloat(){
  if(!camFloating)return;
  const f=camFloat;
  f.x+=f.vx;f.y+=f.vy;
  f.vy-=0.003; // float upward slowly
  f.vx*=0.999;
  f.rot+=f.vr;
  f.scale=Math.max(0.3,f.scale-0.0008);
  // Wrap around screen edges
  if(f.x<-60)f.x=W+60;if(f.x>W+60)f.x=-60;
  if(f.y<-60)f.y=H+60;if(f.y>H+60)f.y=-60;
}

function drawCamFloat(){
  if(!camFloating||!camReady||!camVideo)return;
  const f=camFloat;
  const sz=50*f.scale;
  X.save();
  X.translate(f.x,f.y);
  X.rotate(f.rot);
  X.globalAlpha=f.alpha;

  // Tumbling afterimages (like Mario spinning in the video)
  if(f.tumbling){
    for(let i=1;i<=3;i++){
      X.globalAlpha=f.alpha*(0.12-i*0.03);
      X.save();X.rotate(-f.vr*i*4);
      X.fillStyle='rgba(100,150,255,0.15)';
      X.fillRect(-sz/2-2,-sz/2-2,sz+4,sz+4);
      X.restore();
    }
    X.globalAlpha=f.alpha;
    // Lightning scorch marks around tumbling cam
    if(Math.random()<0.3){
      X.strokeStyle=`rgba(255,255,100,${rnd(0.1,0.4)})`;X.lineWidth=1;
      X.beginPath();X.moveTo(rnd(-sz,sz),rnd(-sz,sz));X.lineTo(rnd(-sz,sz),rnd(-sz,sz));X.stroke();
    }
  }

  // Glow behind
  X.shadowColor=f.tumbling?'#ffcc00':'#4488ff';X.shadowBlur=f.tumbling?25:15;
  X.fillStyle=f.tumbling?'rgba(80,60,20,0.3)':'rgba(30,60,180,0.3)';
  X.fillRect(-sz/2-3,-sz/2-3,sz+6,sz+6);
  X.shadowBlur=0;

  // Camera feed
  X.save();
  X.scale(-1,1); // mirror
  X.drawImage(camVideo,-sz/2,-sz/2,sz,sz);
  X.restore();

  // Border (scorched yellow if tumbling)
  X.strokeStyle=f.tumbling?'#ffaa00':'#4488ff';X.lineWidth=f.tumbling?3:2;
  X.strokeRect(-sz/2,-sz/2,sz,sz);

  // Pixel breakup — faster when tumbling
  const breakRate=f.tumbling?0.5:0.15;
  if(Math.random()<breakRate){
    particles.push({x:f.x+rnd(-sz/2,sz/2),y:f.y+rnd(-sz/2,sz/2),
      vx:rnd(-1,1)+(f.tumbling?rnd(-2,2):0),
      vy:rnd(-1,1)+(f.tumbling?rnd(-2,2):0),
      life:30+Math.random()*20,
      color:f.tumbling?['#ffcc00','#ff8800','#ffffff'][rndI(0,2)]:'#4488ff',
      size:2+Math.random()*3});
  }

  // Small stars around floating face
  for(let i=0;i<3;i++){
    const sa=frameN*0.02+i*2.1;
    const sr=sz*0.6+Math.sin(frameN*0.03+i)*8;
    const stx=Math.cos(sa)*sr,sty=Math.sin(sa)*sr;
    X.fillStyle=`rgba(255,255,255,${0.3+Math.sin(frameN*0.1+i)*0.2})`;
    X.fillRect(stx-1,sty-1,2,2);
  }

  X.globalAlpha=1;
  X.restore();
}

function drawEnemy(e){
  X.save();X.translate(e.x,e.y);
  const s=e.size;

  // Glitch visual offset
  if(e.isGlitch){
    const gx=(Math.random()-.5)*3,gy=(Math.random()-.5)*3;
    X.translate(gx,gy);
    // Glitch scanlines
    if(frameN%3===0){X.fillStyle='rgba(255,0,255,0.1)';X.fillRect(-s/2,rnd(-s/2,s/2),s,2);}
  }

  // Shield
  if(e.shieldHP>0){
    X.strokeStyle=`rgba(100,180,255,${0.3+0.3*(e.shieldHP/e.maxShieldHP)})`;X.lineWidth=2;X.shadowColor='#88ccff';X.shadowBlur=10;
    X.beginPath();X.arc(0,0,s/2+8,0,Math.PI*2);X.stroke();X.shadowBlur=0;
  }

  // Body
  if(e.flash>0)X.fillStyle='#fff';
  else if(e.isThief){
    X.fillStyle='#ffdd00';X.shadowColor='#ffdd00';X.shadowBlur=6;
  }
  else if(e.bombOnly){
    X.fillStyle='#ff8800';X.shadowColor='#ff8800';X.shadowBlur=8;
  }
  else if(e.bulletOnly){
    X.fillStyle='#44aaff';X.shadowColor='#44aaff';X.shadowBlur=8;
  }
  else if(e.type==='cosmic'&&e.cosmicColor){
    X.fillStyle=e.cosmicColor;
    // Cosmic aura
    X.shadowColor=e.cosmicColor;X.shadowBlur=12+Math.sin(frameN*0.06)*4;
  }
  else if(e.isGlitch){
    const hue=280+Math.sin(frameN*0.1)*20;
    X.fillStyle=e.isClone?`hsl(${hue},60%,40%)`:`hsl(${hue},80%,${e.tier===6?45:35}%)`;
    if(e.transformedAs){X.fillStyle=`hsl(${350+e.transformedAs*10},80%,50%)`;}
  }
  else{const cols={normal:'#e94560',fast:'#ff6644',tank:'#cc2222',shooter:'#ff44aa',zigzag:'#ff8844'};X.fillStyle=cols[e.type]||'#e94560';if(e.tier>=4)X.fillStyle='#bb1133';if(e.tier>=5)X.fillStyle='#ff1111';}

  X.shadowColor=X.fillStyle;X.shadowBlur=4+e.tier*2;
  X.fillRect(-s/2,-s/2,s,s);X.shadowBlur=0;

  // Highlight
  X.fillStyle='rgba(255,255,255,0.1)';X.fillRect(-s/2,-s/2,s,2+e.tier);

  // Eyes
  if(e.tier>=1||e.isGlitch){
    const eo=s*0.2,es=Math.min(2+e.tier,8);
    X.fillStyle='#fff';X.fillRect(-eo-es/2,-eo,es,es);X.fillRect(eo-es/2,-eo,es,es);
    X.fillStyle=e.isGlitch?'#f0f':'#000';
    const ps=es*0.5;X.fillRect(-eo-ps/2+1,-eo+1,ps,ps);X.fillRect(eo-ps/2+1,-eo+1,ps,ps);
  }

  // Tier 4+ crown
  if(e.tier>=4&&!e.isGlitch){
    X.fillStyle=e.tier>=5?'#ff0':'#ffa500';
    X.fillRect(-s/2+4,-s/2-s*0.25,4,s*0.25);X.fillRect(s/2-8,-s/2-s*0.25,4,s*0.25);
    if(e.tier>=5)X.fillRect(-2,-s/2-s*0.33,4,s*0.33);
  }

  // Glitch Overlord decorations
  if(e.isGlitch&&e.tier===6){
    // Corrupted crown
    X.fillStyle='#ff00ff';
    for(let i=0;i<5;i++){const cx=-s/2+i*(s/4);X.fillRect(cx,-s/2-12+Math.sin(frameN*0.1+i)*3,6,12);}
    // Aura
    X.strokeStyle='rgba(255,0,255,0.2)';X.lineWidth=2;
    X.beginPath();X.arc(0,0,s/2+15+Math.sin(frameN*0.05)*5,0,Math.PI*2);X.stroke();
    // Phase indicator
    X.fillStyle='#ff88ff';X.font='bold 12px monospace';X.textAlign='center';
    X.fillText(`P${e.glitchPhase}/7`,0,s/2+16);
  }
  // Underlord mark
  if(e.isUnderlord){X.fillStyle='#ff00ff';X.font='bold 10px monospace';X.textAlign='center';X.fillText('UL',0,4);}
  // Clone mark (subtle)
  if(e.isClone){X.globalAlpha=0.5+Math.sin(frameN*0.15)*0.3;}

  // HP bar
  if((e.tier>0||e.isGlitch||e.type==='cosmic')&&e.hp<e.maxHP){
    const bw=s+6,bh=4;X.fillStyle='#300';X.fillRect(-bw/2,-s/2-14,bw,bh);
    X.fillStyle=e.isGlitch?'#ff00ff':e.type==='cosmic'?e.cosmicColor:'#f44';
    X.fillRect(-bw/2,-s/2-14,bw*(e.hp/e.maxHP),bh);
    if(e.shieldHP>0){X.fillStyle='#48f';X.fillRect(-bw/2,-s/2-18,bw*(e.shieldHP/e.maxShieldHP),2);}
  }
  // Labels
  if(e.type==='cosmic'&&e.cosmicName){
    X.fillStyle=e.cosmicColor;X.font='bold 10px "Segoe UI"';X.textAlign='center';
    X.fillText(e.cosmicName,0,-s/2-22);
  }
  if(e.isThief){X.fillStyle='#ffdd00';X.font='bold 8px "Segoe UI"';X.textAlign='center';X.fillText('THIEF',0,-s/2-10);}
  if(e.bombOnly){X.fillStyle='#ff8800';X.font='bold 9px "Segoe UI"';X.textAlign='center';X.fillText('BOMB ONLY',0,-s/2-22);
    X.strokeStyle='rgba(255,136,0,0.4)';X.lineWidth=2;X.beginPath();X.arc(0,0,s/2+5,0,Math.PI*2);X.stroke();
  }
  if(e.bulletOnly){X.fillStyle='#44aaff';X.font='bold 9px "Segoe UI"';X.textAlign='center';X.fillText('BULLET ONLY',0,-s/2-22);
    X.strokeStyle='rgba(68,170,255,0.4)';X.lineWidth=2;X.beginPath();X.arc(0,0,s/2+5,0,Math.PI*2);X.stroke();
  }

  X.textAlign='start';X.globalAlpha=1;
  X.restore();
}

function drawOrb(){
  const o=orb;
  if(orbDeathAnim>0){
    // Fading orb
    if(orbTimer<150){
      X.globalAlpha=Math.max(0,1-orbTimer/150);
      X.fillStyle='#ff88ff';X.shadowColor='#ff00ff';X.shadowBlur=20;
      X.beginPath();X.arc(o.x,o.y,o.radius,0,Math.PI*2);X.fill();X.shadowBlur=0;
      // Crystal shards
      X.strokeStyle='rgba(255,200,255,'+X.globalAlpha+')';X.lineWidth=2;
      for(let i=0;i<6;i++){
        const a=(Math.PI*2/6)*i+orbTimer*0.03;
        const r=o.crystalRadius+Math.sin(orbTimer*0.1+i)*5;
        X.beginPath();X.moveTo(o.x+Math.cos(a)*r*0.7,o.y+Math.sin(a)*r*0.7);
        X.lineTo(o.x+Math.cos(a)*r,o.y+Math.sin(a)*r);X.stroke();
      }
      X.globalAlpha=1;
    }
    return;
  }

  // Crystal shell
  X.save();X.translate(o.x,o.y);X.rotate(o.crystalAngle);
  const sides=8;const cr=o.crystalRadius+Math.sin(o.pulseT)*3;
  X.strokeStyle=o.flash>0?'#fff':'rgba(200,150,255,0.6)';X.lineWidth=2;X.shadowColor='#cc88ff';X.shadowBlur=12;
  X.beginPath();
  for(let i=0;i<=sides;i++){const a=(Math.PI*2/sides)*i;X.lineTo(Math.cos(a)*cr,Math.sin(a)*cr);}
  X.closePath();X.stroke();X.shadowBlur=0;

  // Inner orb
  const pulse=0.8+Math.sin(o.pulseT*2)*0.2;
  const grad=X.createRadialGradient(0,0,0,0,0,o.radius*pulse);
  grad.addColorStop(0,'#ffffff');grad.addColorStop(0.5,'#ff88ff');grad.addColorStop(1,'#aa00aa');
  X.fillStyle=grad;X.shadowColor='#ff00ff';X.shadowBlur=15;
  X.beginPath();X.arc(0,0,o.radius*pulse,0,Math.PI*2);X.fill();X.shadowBlur=0;
  X.restore();

  // HP bar
  const bw=70,bh=5;
  X.fillStyle='#300';X.fillRect(o.x-bw/2,o.y-cr-16,bw,bh);
  X.fillStyle='#ff88ff';X.fillRect(o.x-bw/2,o.y-cr-16,bw*(o.hp/o.maxHP),bh);
  X.fillStyle='#fff';X.font='9px monospace';X.textAlign='center';
  X.fillText('THE ORB',o.x,o.y-cr-20);X.textAlign='start';
}

function drawHUD(){
  const total=BCOLS*BROWS,ratio=aliveN/total;
  // Block bar
  const bw=180,bh=12,bx=W/2-bw/2,by=H-16;
  X.fillStyle='#111';X.fillRect(bx,by,bw,bh);
  X.fillStyle=ratio>0.5?'#4488ff':ratio>0.25?'#ff8800':'#ff2222';
  X.fillRect(bx,by,bw*ratio,bh);X.strokeStyle='#336';X.lineWidth=1;X.strokeRect(bx,by,bw,bh);
  X.fillStyle='#fff';X.font='9px monospace';X.textAlign='center';
  X.fillText(`BLOCKS ${aliveN}/${total}`,W/2,by+10);X.textAlign='start';

  // Left
  X.fillStyle=wave===118?'#ff00ff':'#4488ff';X.font='bold 15px "Segoe UI"';
  X.fillText(wave===118?'SECRET WAVE 118':`Wave ${wave}/${TOTAL_WAVES}`,10,20);
  // Planet name
  const plHud=getPlanetForWave(wave);
  X.fillStyle='#666';X.font='10px "Segoe UI"';X.fillText(plHud.name,10,90);
  X.fillStyle='#eee';X.font='bold 15px "Segoe UI"';X.fillText(`Score: ${score}`,10,38);
  X.fillStyle='#aaa';X.font='12px "Segoe UI"';X.fillText(`Best: ${highScore}`,10,54);

  // Glitch phase
  if(glitchBoss){
    X.fillStyle='#ff88ff';X.font='bold 13px "Segoe UI"';
    X.fillText(`Overlord Phase ${glitchPhase}/7`,10,70);
    // Boss HP bar
    const bhw=150,bhh=6;
    X.fillStyle='#300';X.fillRect(10,74,bhw,bhh);
    X.fillStyle='#ff00ff';X.fillRect(10,74,bhw*(glitchBoss.hp/glitchBoss.maxHP),bhh);
  }
  if(orbMode&&orb){
    X.fillStyle='#ff88ff';X.font='bold 13px "Segoe UI"';
    X.fillText('THE ORB',10,70);
    const bhw=100;X.fillStyle='#300';X.fillRect(10,74,bhw,5);
    X.fillStyle='#ff88ff';X.fillRect(10,74,bhw*(orb.hp/orb.maxHP),5);
  }

  // Right
  X.textAlign='right';
  X.fillStyle='#ff0';X.font='13px "Segoe UI"';X.fillText(`Bombs: ${bombN} [SPACE]`,W-10,20);
  X.fillStyle='#ffdd00';X.fillText(`$${spazeMoney} [U=upgrade]`,W-10,36);
  X.fillStyle='#777';X.font='10px monospace';
  X.fillText(`${CANNON_UPGRADES[cannonLevel-1].name} | DMG:${bDmg.toFixed(1)} RATE:${shootRate} MULTI:${multi}`,W-10,50);
  const te=enemies.length+waveELeft+meteors.length;
  if(te>0){X.fillStyle='#e94560';X.font='12px "Segoe UI"';X.fillText(`Enemies: ${te}`,W-10,64);}
  if(micActive){X.fillStyle=micCooldown>0?'#555':'#44ffaa';X.font='10px "Segoe UI"';X.fillText(micCooldown>0?'MIC: cooldown':'MIC: speak for ally',W-10,78);}
  // Mercy Button hint
  // Active ultra power-up indicators
  let uhY=92;
  if(quantumShieldActive){X.fillStyle='#00ffff';X.font='9px "Segoe UI"';X.fillText('QUANTUM SHIELD',W-10,uhY);uhY+=12;}
  if(chainLightningActive){X.fillStyle='#44ddff';X.font='9px "Segoe UI"';X.fillText('CHAIN LIGHTNING',W-10,uhY);uhY+=12;}
  if(hyperCannonActive){X.fillStyle='#ffff00';X.font='9px "Segoe UI"';X.fillText('HYPER CANNON',W-10,uhY);uhY+=12;}
  if(gravityWellActive){X.fillStyle='#aa00ff';X.font='9px "Segoe UI"';X.fillText('GRAVITY WELL',W-10,uhY);uhY+=12;}
  if(orbitalStrikeActive){X.fillStyle='#ff8800';X.font='9px "Segoe UI"';X.fillText('ORBITAL STRIKE',W-10,uhY);uhY+=12;}
  if(phoenixReady){X.fillStyle='#ff6600';X.font='9px "Segoe UI"';X.fillText('PHOENIX READY',W-10,uhY);uhY+=12;}
  if(superGoldActive){X.fillStyle='#ffdd00';X.font='9px "Segoe UI"';X.fillText('GOLD x10',W-10,uhY);uhY+=12;}
  if(!mercyUsed&&!simonActive&&wave<118){X.fillStyle=`rgba(255,204,0,${0.4+Math.sin(frameN*0.06)*0.2})`;X.font='10px "Segoe UI"';X.fillText('[M] Mercy Button',W-10,uhY);}
  X.textAlign='start';
}

// ─── LOOP ───
function loop(){update();updateCamFloat();draw();requestAnimationFrame(loop);}
loop();
</script>
